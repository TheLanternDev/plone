function detectLang() {
  if (SEALED_LANG && LANG[SEALED_LANG]) return SEALED_LANG;
  try {
    const params = new URLSearchParams(location.search);
    const fromUrl = params.get('lang');
    if (fromUrl && LANG[fromUrl]) {
      try { localStorage.setItem('plone_lang', fromUrl); } catch (e) {}
      return fromUrl;
    }
    const stored = localStorage.getItem('plone_lang');
    if (stored && LANG[stored]) return stored;
  } catch (e) {}
  return 'pl';
}

const ACTIVE = detectLang();
const L = LANG[ACTIVE];

function applyShell() {
  document.documentElement.lang = L.meta.htmlLang;
  document.title = L.meta.title;
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
  setMeta('meta[name="description"]', L.meta.description);
  setMeta('meta[property="og:title"]', L.meta.ogTitle);
  setMeta('meta[property="og:description"]', L.meta.ogDescription);
  setMeta('meta[property="og:locale"]', L.meta.ogLocale);
  setMeta('meta[name="twitter:title"]', L.meta.ogTitle);
  setMeta('meta[name="twitter:description"]', L.meta.ogDescription);

  const left = document.getElementById('room-left');
  if (left) {
    left.textContent = L.ui.roomLeftLabel;
    left.setAttribute('aria-label', L.ui.roomLeftAria);
  }
  const right = document.getElementById('room-right');
  if (right) {
    right.textContent = L.ui.roomRightLabel;
    right.setAttribute('aria-label', L.ui.roomRightAria);
  }
  const bar = document.getElementById('langbar');
  if (bar) bar.setAttribute('aria-label', L.ui.langAria);
}

function buildLangBar() {
  const bar = document.getElementById('langbar');
  if (!bar) return;
  if (SEALED_LANG) {
    /* opened sealed file: language is locked to the seal */
    bar.style.display = 'none';
    return;
  }
  const order = ['pl', 'en', 'es', 'nl', 'uk'];
  bar.innerHTML = '';
  order.forEach((code, idx) => {
    if (idx > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '·';
      bar.appendChild(sep);
    }
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = code;
    b.setAttribute('aria-label', code.toUpperCase());
    if (code === ACTIVE) b.classList.add('on');
    b.addEventListener('click', () => {
      if (code === ACTIVE) return;
      try { localStorage.setItem('plone_lang', code); } catch (e) {}
      const url = new URL(location.href);
      url.searchParams.set('lang', code);
      location.href = url.toString();
    });
    bar.appendChild(b);
  });
}

function xorCipher(text, key) {
  let out = '';
  for (let i = 0; i < text.length; i++) {
    out += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return out;
}
function xorKeyV2(iso) { return iso + '|' + POM_KEY_PEPPER; }
function toB64(s) { return btoa(unescape(encodeURIComponent(s))); }
function fromB64(s) { return decodeURIComponent(escape(atob(s))); }

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(L.meta.dateLocale, { year: 'numeric', month: 'long', day: 'numeric' });
}

function renderCreate() {
  const root = document.getElementById('root');
  const c = L.create;
  root.innerHTML = `
    <h1></h1>
    <p class="sub"></p>
    <p class="welcome"></p>
    <textarea id="letter"></textarea>
    <div class="row">
      <label for="when"></label>
      <input type="date" id="when" />
    </div>
    <button id="seal" class="primary"></button>
    <p class="note">
      <span class="n1"></span><br>
      <span class="n2"></span>
    </p>
  `;
  root.querySelector('h1').textContent = c.h1;
  root.querySelector('.sub').textContent = c.sub;
  root.querySelector('.welcome').textContent = c.welcome;
  root.querySelector('#letter').placeholder = c.placeholder;
  root.querySelector('label').textContent = c.whenLabel;
  root.querySelector('#seal').textContent = c.button;
  root.querySelector('.note .n1').textContent = c.noteLine1;
  root.querySelector('.note .n2').textContent = c.noteLine2;

  const today = new Date();
  const inOneYear = new Date(today);
  inOneYear.setFullYear(today.getFullYear() + 1);
  document.getElementById('when').value = inOneYear.toISOString().slice(0, 10);
  document.getElementById('when').min = today.toISOString().slice(0, 10);
  document.getElementById('seal').addEventListener('click', seal);
}

async function seal() {
  const text = document.getElementById('letter').value.trim();
  const when = document.getElementById('when').value;
  if (!text) { document.getElementById('letter').focus(); return; }
  if (!when) return;

  const fx = document.getElementById('seal-fx');
  fx.classList.add('on');
  await new Promise(r => setTimeout(r, 1100));

  const cipher = toB64(xorCipher(text, xorKeyV2(when)));
  const payload = { v: 2, c: cipher, d: when, sealed_at: new Date().toISOString().slice(0, 10) };
  const html = await currentSourceWithPayload(payload, ACTIVE);

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '.pomiedzy-' + when + '.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  await new Promise(r => setTimeout(r, 1300));
  fx.classList.remove('on');

  const root = document.getElementById('root');
  const s = L.sealed;
  root.innerHTML = `
    <h1></h1>
    <p class="sub"></p>
    <div class="when"></div>
    <p class="note">
      <span class="n1"></span><br>
      <span class="n2"></span>
    </p>
  `;
  root.querySelector('h1').textContent = s.h1;
  root.querySelector('.sub').textContent = s.sub;
  root.querySelector('.when').textContent = s.whenPrefix + fmtDate(when);
  root.querySelector('.note .n1').textContent = s.noteLine1;
  root.querySelector('.note .n2').textContent = s.noteLine2;
}

async function currentSourceWithPayload(payload, lang) {
  const json = JSON.stringify(payload).replace(/</g, '\\u003c');
  const langJson = JSON.stringify(lang);
  let src = PRISTINE_SOURCE.replace(
    'const SEALED_PAYLOAD = null;',
    'const SEALED_PAYLOAD = ' + json + ';'
  );
  src = src.replace(
    'const SEALED_LANG = null;',
    'const SEALED_LANG = ' + langJson + ';'
  );
  return '<!doctype html>\n' + src;
}

function renderSealed(payload) {
  const root = document.getElementById('root');
  const today = new Date();
  const open = new Date(payload.d + 'T00:00:00');
  const d0 = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (d0(today) < d0(open)) {
    const ny = L.notYet;
    root.innerHTML = `
      <div class="sealed">
        <div class="glow"></div>
        <h1></h1>
        <div class="when"></div>
        <div class="mark"></div>
      </div>
    `;
    root.querySelector('h1').textContent = ny.h1;
    root.querySelector('.when').textContent = ny.whenPrefix + fmtDate(payload.d);
    root.querySelector('.mark').textContent = L.ui.mark;
    return;
  }

  let plain = '';
  try {
    if (payload.v === 2 && payload.c) plain = xorCipher(fromB64(payload.c), xorKeyV2(payload.d));
    else if (payload.c) plain = xorCipher(fromB64(payload.c), payload.d);
  } catch (e) { plain = L.err.read; }

  root.innerHTML = `
    <div class="sealed">
      <div class="glow"></div>
      <div class="letter" id="letter"></div>
      <div class="mark"></div>
    </div>
  `;
  root.querySelector('.mark').textContent = L.opened.prefix + new Date().toLocaleDateString(L.meta.dateLocale);
  const el = document.getElementById('letter');
  let i = 0;
  const speed = 28;
  const tick = () => {
    el.textContent = plain.slice(0, ++i);
    if (i < plain.length) setTimeout(tick, speed);
  };
  setTimeout(tick, 1200);
}

applyShell();
buildLangBar();

if (SEALED_PAYLOAD) renderSealed(SEALED_PAYLOAD);
else renderCreate();
</script>
</body>
</html>
