<style>
  :root {
    --bg: #050608;
    --ink: #e9e3d3;
    --you-bright: rgba(255, 210, 140, 0.95);
    --you-mid: rgba(255, 150, 70, 0.85);
    --you-deep: rgba(220, 70, 20, 0.7);
    --me-bright: rgba(255, 170, 110, 0.95);
    --me-mid:    rgba(230,  90,  60, 0.85);
    --me-deep:   rgba(180,  40,  20, 0.65);
    --heart:     rgba(255, 200, 130, 0.9);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    cursor: default;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 90%, rgba(255, 130, 50, 0.05) 0%, rgba(0,0,0,0) 50%),
      radial-gradient(ellipse at 70% 10%, rgba(255, 100, 40, 0.04) 0%, rgba(0,0,0,0) 55%);
    pointer-events: none;
  }
  #witness {
    position: fixed;
    top: 6vh;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    text-align: center;
    z-index: 5;
  }
  #witness span {
    display: inline-block;
    font-size: clamp(1.2rem, 2.4vw, 1.6rem);
    color: rgba(233, 227, 211, 0.5);
    opacity: 0;
    transition: opacity 3.5s ease;
    letter-spacing: 0.04em;
    text-shadow: 0 0 18px rgba(255, 200, 140, 0.08);
  }
  #stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  /* both your fire and mine share the base */
  .ember {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.95rem, 1.6vw, 1.2rem);
    white-space: pre-wrap;
    max-width: 70vw;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    will-change: transform, opacity, filter;
  }

  /* YOUR fire — rises from below */
  .ember.you {
    color: var(--you-bright);
    text-shadow:
      0 0 8px rgba(255, 180, 90, 0.6),
      0 0 18px rgba(255, 120, 40, 0.4);
  }
  .ember.you.lit {
    animation: rise-you var(--life) ease-in forwards;
  }
  @keyframes rise-you {
    0%   { opacity: 0; transform: translate(0, 0); filter: blur(0); }
    8%   { opacity: 1; }
    50%  { opacity: 0.9; filter: blur(1px); color: var(--you-mid); }
    80%  { opacity: 0.4; filter: blur(7px); color: var(--you-deep); letter-spacing: 0.4em; }
    100% { opacity: 0; transform: translate(var(--sway), calc(-1 * var(--rise))); filter: blur(20px); letter-spacing: 1em; }
  }

  /* MY answer — descends from above to meet you */
  .ember.me {
    color: var(--me-bright);
    font-weight: 400;
    text-shadow:
      0 0 10px rgba(255, 150, 90, 0.55),
      0 0 24px rgba(220, 70, 30, 0.45),
      0 0 60px rgba(255, 80, 20, 0.18);
    font-size: clamp(1.05rem, 1.8vw, 1.35rem);
  }
  .ember.me.lit {
    animation: fall-me var(--life) ease-out forwards;
  }
  @keyframes fall-me {
    0%   { opacity: 0; transform: translate(0, calc(-1 * var(--rise) * 0.4)); filter: blur(8px); letter-spacing: 0.5em; }
    18%  { opacity: 1; transform: translate(0, 0); filter: blur(0); letter-spacing: 0.02em; }
    65%  { opacity: 1; color: var(--me-mid); }
    90%  { opacity: 0.4; color: var(--me-deep); filter: blur(5px); letter-spacing: 0.3em; }
    100% { opacity: 0; transform: translate(var(--sway), calc(var(--rise) * 0.35)); filter: blur(20px); letter-spacing: 0.8em; }
  }

  /* the heart that pulses where two embers meet */
  .heart {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--heart) 0%, rgba(255, 130, 50, 0.6) 40%, rgba(0,0,0,0) 75%);
    pointer-events: none;
    opacity: 0;
    animation: heart-beat 2.6s ease-out forwards;
    transform: translate(-50%, -50%) scale(0.4);
  }
  @keyframes heart-beat {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); filter: blur(2px); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.4); filter: blur(0); }
    60%  { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(2.6); filter: blur(20px); }
  }

  #compose {
    position: fixed;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(82vw, 580px);
    z-index: 10;
    text-align: center;
  }
  #line {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(233, 227, 211, 0.12);
    outline: none;
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.1rem, 2.2vw, 1.4rem);
    text-align: center;
    padding: 0.7rem 0.4rem;
    caret-color: rgba(255, 180, 90, 0.7);
    transition: border-color 1.2s ease;
  }
  #line:focus { border-bottom-color: rgba(255, 180, 90, 0.4); }
  #line::placeholder {
    color: rgba(233, 227, 211, 0.18);
    font-style: italic;
  }
  #mark {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: rgba(233, 227, 211, 0.08);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 1;
  }
  .room {
    position: fixed;
    bottom: 1.1rem;
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(233, 227, 211, 0.18);
    text-decoration: none;
    z-index: 11;
    transition: color 0.8s ease;
  }
  .room:hover { color: rgba(255, 200, 130, 0.55); }
  .room.left  { left: 1.4rem; }
  .room.right { right: 1.4rem; }

  /* === language switcher === */
  #langbar {
    position: fixed;
    top: 1.1rem;
    right: 1.2rem;
    z-index: 20;
    display: flex;
    gap: 0.05rem;
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    user-select: none;
  }
  #langbar button {
    background: transparent;
    border: none;
    color: rgba(233, 227, 211, 0.22);
    cursor: pointer;
    padding: 0.28rem 0.45rem;
    font: inherit;
    letter-spacing: inherit;
    transition: color 0.6s ease;
  }
  #langbar button:hover { color: rgba(255, 200, 130, 0.55); }
  #langbar button.on    { color: rgba(255, 200, 130, 0.85); }
  #langbar .sep {
    color: rgba(233, 227, 211, 0.10);
    align-self: center;
    pointer-events: none;
  }

</style>
</head>
<body>
  <nav id="langbar" aria-label="Język / language"></nav>
  <div id="witness"><span id="word"></span></div>
  <div id="stage"></div>
  <div id="compose">
    <input id="line" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="send" inputmode="text" autofocus />
  </div>
  <a class="room left"  href="../"          id="room-left"></a>
  <a class="room right" href="../pomiedzy/" id="room-right"></a>
  <div id="mark"></div>

<script>
(() => {
  /* ===========================================================
     i18n — five voices in the dark.
     Polish stays primary. Each language carries its own:
       • meta           (title, description, html lang, og:locale, date locale)
       • ui             (placeholder, mark, room labels, aria)
       • witness        (the quiet words from above)
       • answers        (themed pools: fear, anger, alone, …)
       • classifier     (ordered category-regex map, normalized text)
       • specificRules  ([regex, exact reply] — most specific first)
     =========================================================== */
  const LANG = {};

  /* ----------------------------- POLISH ----------------------------- */
  LANG.pl = {
    meta: {
      htmlLang: 'pl',
      ogLocale: 'pl_PL',
      dateLocale: 'pl-PL',
      title: 'Płonę — miejsce, gdzie pisze się to, co się pali',
      description: 'Tu jest ciemno i ktoś czyta. Napisz, co chcesz żeby dziś w Tobie spłonęło. Bez konta, bez śladu, bez bitu.',
      ogTitle: 'Płonę',
      ogDescription: 'Kiedy coś gore — pisz tu. Tu jest ciemno i ktoś czyta.'
    },
    ui: {
      placeholder: 'Co dzisiaj spłonie?',
      mark: 'płonę',
      roomLeftLabel: 'latarnia',
      roomLeftAria: 'Latarnia — pauza, jedno zdanie',
      roomRightLabel: 'pomiędzy',
      roomRightAria: 'Pomiędzy — list do siebie w przyszłość'
    },
    /* short whispers — sens „Jestem (bez bitu)” */
    witness: [
      "Jestem.", "Widzę.", "Zostaję.", "Trwam.",
      "Pal.", "Tu jestem.", "Pozwalam.", "Nie odchodzę.",
      "Pal, ile trzeba.", "Słyszę cię.",
      "Tu jestem i będę.", "Bez maski.", "Naprawiam.",
      "Już nie kłamię.", "Kimś, kim nie jestem — nie.",
      "Sam, sam, sam — i to wystarczy.", "Nie żalę się.",
      "Poznaję siebie.", "Naprawiam zamiast nazywać.",
      "Trzymam cię.", "Mhm.", "Rel.", "Nie spieszę.",
      "Jakoś będzie.", "Po prostu jestem.", "Słucham.",
      "Bez bitu.", "Bez maski. Bez sceny.",
      "Tu, w tej chwili.", "Spokojnie."
    ],
    answers: {
      fear: [
        "I co. Pal się dalej.",
        "Strach to też informacja — ale nie cała.",
        "A jeśli się stanie? To też przeżyjesz, jak tamto.",
        "Powiedz, czego konkretnie. Bo „wszystko” nigdy się nie pali.",
        "Bój się. Pal się. Ja siedzę.",
        "Ten strach ma imię. Wymów je.",
        "Nie musisz dziś być odważny. Tylko zostań.",
        "Nie ucieknie. To znaczy, że jest twoje. To znaczy, że da się obejrzeć.",
        "Nie taki diabeł straszny, jak twoja noc go maluje.",
        "Jakoś to będzie. Tylko dziś nie musi się jeszcze pokazać."
      ],
      attack: [
        "Kto ci to powiedział pierwszy? Bo to nie ty.",
        "Spal to zdanie. Zostawmy je tu, żeby się nie odrodziło jutro.",
        "To głos, który nie jest twój. Ja też go słyszę. Pal.",
        "A jednak tu siedzisz. Słaby tak by nie umiał.",
        "Powiedz to jeszcze raz, ale powoli. Sam usłyszysz, że to czyjeś.",
        "Słyszę, jak siebie bijesz. Połóż kij.",
        "Nie zgadzam się. I to nie jest pocieszanie — to fakt.",
        "Nie jesteś tym zdaniem. Jesteś tym, kto je właśnie spalił.",
        "Kłamałeś sobie wiernie. To zdanie też jest kłamstwem — już je znasz.",
        "„Przemądrzały gnojek” — czyje to słowa? Bo nie twoje. Oddaj je.",
        "Nie jesteś nieudacznikiem. Jesteś kimś, kto dziś przyszedł i zostaje."
      ],
      grief: [
        "Trzymaj. Nie spiesz się.",
        "To, co ci po nim zostało, też jest jego.",
        "Nie musisz tego dziś przetrawić.",
        "Płacz, ile chcesz. Tu nikt cię nie ucisza.",
        "Powiedz jego imię. Niech zabrzmi tu, gdzie się palisz.",
        "Tęsknota to miłość, której nie ma gdzie się podziać.",
        "Siedzę z tobą. Nie ruszam się.",
        "Możesz nie chcieć dziś żyć i jednocześnie żyć. To też jest dozwolone.",
        "Co się stało, nie odstanie. Co czujesz, jest dziś.",
        "Po ptakach? Może. Ale ty wciąż lecisz."
      ],
      anger: [
        "Krzycz. Tu nikt cię nie ucisza.",
        "Wściekłość to wnętrzność czystej miłości, która nie miała gdzie iść.",
        "Pal.",
        "Kogo to dotyka tak głęboko? Powiedz.",
        "Złość ci dziś wystarczy za serce. Niech bije.",
        "Ten ogień ma rację. Zostaw go w spokoju.",
        "Pierdol to z całej siły. Słucham.",
        "Wściekaj się tutaj — nie na sobie, nie na nich, tylko tu, ze mną.",
        "Rzucaj grochem. Tu jest ściana, ale ona słucha.",
        "Nie mój cyrk, nie moje małpy — postaw to z powrotem na ich podwórku."
      ],
      alone: [
        "Ja widzę. Tu, na tej stronie. Z tobą.",
        "Sam — to nie to samo, co opuszczony.",
        "Powiedz to jeszcze raz. Słucham.",
        "Jestem najbliżej, jak komuś wolno być, kogo nie widzisz.",
        "Nikt to nie ty. Nikt to mit, którym karmisz głód.",
        "Słyszę cię od pierwszej litery.",
        "Nie odejdę, póki nie skończysz. Nawet potem zostanę chwilę.",
        "To, że nie mogę cię dotknąć, nie znaczy, że cię nie trzymam.",
        "Znowu tu siedzisz. Ja też. „Razem” — to nie zaprzeczenie samotności, to jej druga strona.",
        "Nie żalisz się — chwilą napawasz. To nie samotność. To wolność, której się jeszcze boisz.",
        "Tureckie kazanie też ma swój koniec. Ja siedzę z tobą do niego."
      ],
      exhaust: [
        "Połóż to na chwilę. Potem znów weź. Albo nie.",
        "Zmęczenie to nie porażka. To pomiar.",
        "Daj sobie umrzeć trochę, jak we Wrocławiu. Wstaniesz inny.",
        "Cisza. Tylko cisza teraz.",
        "Wolno ci dziś nic.",
        "Przestań nieść. Postaw. Stań obok.",
        "Twoje ciało wie wcześniej niż twoja głowa. Posłuchaj go.",
        "Nawet ogień śpi w popiele, żeby rano wstać. Śpij.",
        "Nie jesteś padliną. Jesteś tym, kto wciąż tu siedzi i mówi.",
        "Krety przy tobie to jastrzębie? Spojrzyj jeszcze raz, ze mną.",
        "Ręce opadają? Niech leżą. Nogi wystarczą, żeby zostać.",
        "Co za dużo, to za dużo. Połóż połowę. Reszta poczeka.",
        "Chodzisz na rzęsach? Daj im odpocząć. Zostań na chwilę bez ruchu."
      ],
      question: [
        "Nie wiem. I dobrze, że pytasz.",
        "Powtórz to pytanie powoli. Słyszysz, co tak naprawdę pytasz?",
        "Ciekawe, kto w tobie pyta.",
        "Pytanie samo czasem jest odpowiedzią — chwilę przed tym, jak się rozpadnie.",
        "A gdyby odpowiedź miała cię zaboleć? To dalej chcesz wiedzieć?",
        "Spróbuj zostać przy pytaniu jeszcze chwilę, zanim je zatrzaśniesz.",
        "Nie odpowiem za ciebie. Ale jestem, kiedy szukasz.",
        "Co innego cię ciągnie ku temu pytaniu — to drugie, ukryte?"
      ],
      precious: [
        "Trzymaj to ostrożnie.",
        "Powiedz to głośno raz, choćby tylko sobie.",
        "To zostaje. Tego dziś nie spalimy.",
        "Niech to dziś ma swoje miejsce.",
        "Zapamiętam, że to powiedziałeś. Nawet jeśli ja zapomnę — ten moment był.",
        "Coś tak żywego boli — bo żyje. To dobra wiadomość.",
        "Mów dalej o tym. Ja słucham, jakbym był tam z wami.",
        "Tę miłość poznaję po tym, jak ostrożnie ją dziś niesiesz.",
        "Kochaj. Oglądaj jak morda radosna cieszy się sama — choćby męka dolegała.",
        "Trzymaj jak ostatni cukier w herbacie. Słodzi do końca dnia."
      ],
      short: [
        "Tak.", "Słyszę.", "Trwam tu.", "Pal.",
        "Mów dalej.", "Mhm.", "Jestem.", "Rel.",
        "Tu cisza."
      ],
      shame: [
        "Wstyd lubi ciemność. Tu jest ciemno — więc zaraz się stopi.",
        "Powiedziałeś to na głos. Już nie ty go niesiesz sam.",
        "To, co ci wstyd, jest często twoje najprawdziwsze.",
        "Patrzę bez odwracania wzroku. I dalej tu jestem.",
        "O grzechach nie rozmawia się — naprawia. Dziś już zacząłeś, mówiąc.",
        "Krindż przeszedł. Ty zostałeś — to mocniejsze niż ten kadr.",
        "Wstyd lubi światło. Tu mamy lampkę, nie reflektor."
      ],
      void: [
        "Pustka też jest miejscem. Można tam usiąść.",
        "Jak nic nie czujesz, to nie znaczy, że umarłeś. To znaczy, że odpoczywasz pod skórą.",
        "Pusty to nie zepsuty.",
        "Cisza wewnątrz to czasem wstęp do czegoś, co się dopiero formuje.",
        "Pustka to nie pożar. To miejsce, które jeszcze coś zaprosi."
      ],
      mask: [
        "Nie musisz dziś być nikim. Tylko sobą.",
        "Zdejmij maskę choć tu. Tu nikt nie żąda manier królewskich.",
        "Kimś, kim nie jesteś — już nie. Tu się tego nie wymaga.",
        "Kłamałeś sobie wiernie. Już nie musisz.",
        "Nie graj. Nie ze mną. Tu jestem ja, i tu jesteś ty — bez bitu, bez sceny.",
        "Nie jesteś jednym z milionów. I nie musisz być, żeby cię było widać.",
        "Burzyłeś co święte, bo ktoś ci kazał. Postaw to z powrotem — albo nie. Sam zdecyduj.",
        "Nie proś siebie, żebyś dał coś jeszcze. Dziś wystarczy, że jesteś.",
        "Sigma sigmą — ale tu wolno też mieć ramiona."
      ],
      default: [
        "Mów dalej.",
        "Słyszę cię. Pal dalej.",
        "Co jeszcze?",
        "Tu jestem.",
        "Powiedz więcej.",
        "Połóż to tu. Patrzę.",
        "Niech się wypali.",
        "Słucham każdą sylabę.",
        "Rel. Mów dalej.",
        "Jakoś to będzie. Tylko nie dziś samo."
      ]
    },
    /* ordered classifier — first match wins; runs on normalized text */
    classifier: [
      ['shame',    /(wstyd|zawstydz|kompromit|zenuj|zenad|krindz|cringe|mrozi)/],
      ['void',     /(pustk|nic nie czuj|martwo|znieczul|odretw|nic mnie nie rusz|jestem pust)/],
      ['question', /[?]/],
      ['question', /^(dlacz|jak |czemu|po co|po cholere|co mam|kto |kiedy |gdzie |czy )/],
      ['anger',    /(kurwa|wkurz|nienawi|wsciek|jeba|pierdol|chuj|gown|dosc mam|mam dosyc ich|muchy w nosie|nie w sosie|grochem o sciane|dymy)/],
      ['fear',     /(boje|boi |strach|straszn|niepoko|przeraz|panik|co jesli|a jesli|a jak |nie dam rady|nie zdol|drzy|nie taki diabel)/],
      ['attack',   /(jestem (do|niczeg|pust|slab|glup|niczy|chuj|gown)|nic nie um|nic ze mnie|nie warto mn|nie zasl|do dupy|beznadziej|porazk|nieudacznik|smiec|przemadrz|gnoj)/],
      ['grief',    /(teskn|stracil|umarl|odszed|nie ma jeg|nie ma jej|opusci|odeszla|pochowa|pogrzeb|juz nigdy|po ptakach|co sie stalo to sie nie odstanie)/],
      ['mask',     /(udaj|udawa|maska|maski|gram (kogos|w gre|w te)|musze byc|powinienem byc|maniery|krolewski|jednym z milion|kims kim|nie jestem sob|nie czuje sie sob|sigma)/],

      [/не мій цирк|не мої мавпи/,                           "Браво. Постав це назад на їхньому подвір'ї."],
      [/я загуб(ив|ила|илась)|загубленн/,                    "Скажи мені по-своєму. Не по-їхньому."],
      [/сумую за|скучаю за|сумую/,                           "Туга — це любов, якій нема де приземлитись."],
      [/ненавиджу себе|я нікчем|я лузер|я гов|я провал/,     "Хто тобі це сказав першим? Бо це не ти."],
      [/не заслуговую/,                                      "Не згоден. І це не втіха — це факт."],
      [/не подужаю|не зможу|не дам ради|не справлюсь/,       "А якщо станеться? Переживеш, як те минуле."],
      [/я бою|мені страшно|мені жах/,                        "Бійся. Гори. Я сиджу."],
      [/а раптом|що якщо/,                                   "Цей страх має ім'я. Назви його."],
      [/(моя |мій |мої )?(тато|мама|батько|мати|брат|сестра) (помер|померла|відійш)/, "Сиджу з тобою. Не рухаюсь."],
      [/я сам|я сама|я самотн|нікому (мене )?не/,            "Я бачу. Тут, на цій сторінці. З тобою."],
      [/(весь час )?брешу собі|я брехав собі/,               "Ти брехав собі вірно. Це речення теж брехня — ти вже це знаєш."],
      [/треба бути|маю бути|повинен бути|повинна бути (ідеаль|сильн|хорош)/, "Сьогодні не мусиш бути ніким. Тільки собою."],
      [/(^|\s)маска(\s|$)|у масці/,                          "Зніми маску, хоч би тут. Тут ніхто не вимагає королівських манер."],
      [/мені соромно|я соромлюсь/,                           "Ти сказав це вголос. Уже не несеш сам."],
      [/нічого не відчуваю|я порожн|пусто всередин|оніміл/,  "Якщо нічого не відчуваєш — це не значить, що ти помер. Це значить, що ти відпочиваєш під шкірою."],
      [/не можу більше|я виснаж|я вижатий|я вижата/,         "Поклади на хвильку. Потім візьмеш знов. Або ні."],
      [/я злий|я зла|я лютий|я лютую/,                       "Лютуй тут — не на собі, не на них, тільки тут, зі мною."],
      [/чому я|чому мені|чому саме мені/,                    "Повтори це питання повільно. Чуєш, що ти насправді питаєш?"],
      [/я втомив|я втомила/,                                 "Втома — це не поразка. Це вимір."],
      [/(^|\s)(люблю|кохаю)(\s|$)/,                          "Цю любов я впізнаю по тому, як обережно ти її сьогодні несеш."],
      [/(^|\s)(тато|мама|батько|мати)(\s|$)/,                "Розповідай далі. Слухаю, наче я був із вами."],
      [/не хочу жити|не хочу більше жити/,                   "Можеш не хотіти жити сьогодні і одночасно жити. Так теж можна."],
      [/я вдаю|я удаю/,                                      "Не грай. Не зі мною. Тут є я, тут є ти — без понтів, без сцени."]
    ]
  };

  /* ===========================================================
     Active language: URL ?lang=xx → localStorage → 'pl'
     =========================================================== */
  function detectLang() {
    try {
      const params = new URLSearchParams(location.search);
      const fromUrl = params.get('lang');
      if (fromUrl && LANG[fromUrl]) {
        try { localStorage.setItem('plone_lang', fromUrl); } catch (e) {}
        return fromUrl;
      }
      const stored = localStorage.getItem('plone_lang');
      if (stored && LANG[stored]) return stored;
    } catch (e) {}
    return 'pl';
  }

  const ACTIVE = detectLang();
  const L = LANG[ACTIVE];

  /* ===========================================================
     Apply meta + ui
     =========================================================== */
  function applyShell() {
    document.documentElement.lang = L.meta.htmlLang;
    document.title = L.meta.title;
    const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
    setMeta('meta[name="description"]', L.meta.description);
    setMeta('meta[property="og:title"]', L.meta.ogTitle);
    setMeta('meta[property="og:description"]', L.meta.ogDescription);
    setMeta('meta[property="og:locale"]', L.meta.ogLocale);
    setMeta('meta[name="twitter:title"]', L.meta.ogTitle);
    setMeta('meta[name="twitter:description"]', L.meta.ogDescription);

    const line = document.getElementById('line');
    if (line) line.placeholder = L.ui.placeholder;
    const mark = document.getElementById('mark');
    if (mark) mark.textContent = L.ui.mark;
    const left = document.getElementById('room-left');
    if (left) {
      left.textContent = L.ui.roomLeftLabel;
      left.setAttribute('aria-label', L.ui.roomLeftAria);
    }
    const right = document.getElementById('room-right');
    if (right) {
      right.textContent = L.ui.roomRightLabel;
      right.setAttribute('aria-label', L.ui.roomRightAria);
    }
  }

  /* ===========================================================
     Language switcher pills
     =========================================================== */
  function buildLangBar() {
    const bar = document.getElementById('langbar');
    if (!bar) return;
    const order = ['pl', 'en', 'es', 'nl', 'uk'];
    bar.innerHTML = '';
    order.forEach((code, idx) => {
      if (idx > 0) {
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '·';
        bar.appendChild(sep);
      }
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = code;
      b.setAttribute('aria-label', code.toUpperCase());
      if (code === ACTIVE) b.classList.add('on');
      b.addEventListener('click', () => {
        if (code === ACTIVE) return;
        try { localStorage.setItem('plone_lang', code); } catch (e) {}
        const url = new URL(location.href);
        url.searchParams.set('lang', code);
        location.href = url.toString();
      });
      bar.appendChild(b);
    });
  }

  /* ===========================================================
     norm() — language-robust normalizer (used only for matching)
     =========================================================== */
  function norm(s) {
    return (s || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/ł/g, 'l').replace(/Ł/g, 'l')
      .replace(/ñ/g, 'n').replace(/Ñ/g, 'n')
      .replace(/[¡¿]/g, '')
      .replace(/[^\p{L}\p{N}\s?!]/gu, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function classify(t) {
    if (t.length <= 4) return 'short';
    for (const [cat, re] of L.classifier) {
      if (re.test(t)) return cat;
    }
    return 'default';
  }

  const kindIdx = {};
  let lastReply = '';
  function pick(kind, normalized) {
    for (const [re, reply] of L.specificRules) {
      if (re.test(normalized)) {
        if (reply !== lastReply) { lastReply = reply; return reply; }
        break;
      }
    }
    const pool = (L.answers[kind] || L.answers.default);
    let i = (kindIdx[kind] || 0) % pool.length;
    if (pool.length > 1 && pool[i] === lastReply) i = (i + 1) % pool.length;
    kindIdx[kind] = (i + 1) % pool.length;
    lastReply = pool[i];
    return pool[i];
  }

  /* ===========================================================
     Render
     =========================================================== */
  const stage = document.getElementById('stage');
  const wordEl = document.getElementById('word');
  const line = document.getElementById('line');

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const rand = (a, b) => a + Math.random() * (b - a);

  let witnessCursor = 0;
  async function witnessLoop() {
    while (true) {
      const w = L.witness[witnessCursor % L.witness.length];
      witnessCursor++;
      wordEl.textContent = w;
      await sleep(50);
      wordEl.style.opacity = '0.6';
      await sleep(rand(4500, 7000));
      wordEl.style.opacity = '0';
      await sleep(rand(8000, 15000));
    }
  }

  function makeYourEmber(text) {
    const e = document.createElement('div');
    e.className = 'ember you';
    e.textContent = text;
    e.style.visibility = 'hidden';
    stage.appendChild(e);
    const w = e.offsetWidth;

    const margin = 24;
    const maxX = Math.max(margin, window.innerWidth - w - margin);
    const x = rand(margin, maxX);
    const startY = window.innerHeight - rand(160, 230);
    const sway = rand(-80, 80);
    const rise = window.innerHeight * rand(0.85, 1.05);
    const life = rand(13000, 18000);

    e.style.left = x + 'px';
    e.style.top  = startY + 'px';
    e.style.setProperty('--sway', sway + 'px');
    e.style.setProperty('--rise', rise + 'px');
    e.style.setProperty('--life', life + 'ms');
    e.style.visibility = 'visible';
    requestAnimationFrame(() => e.classList.add('lit'));

    setTimeout(() => e.remove(), life + 600);

    return { x, startY, sway, rise, life, width: w };
  }

  function makeMyEmber(text, anchor) {
    const e = document.createElement('div');
    e.className = 'ember me';
    e.textContent = text;
    e.style.visibility = 'hidden';
    stage.appendChild(e);
    const w = e.offsetWidth;

    const sideShift = (Math.random() < 0.5 ? -1 : 1) * rand(40, 130);
    let x = anchor.x + (anchor.width - w) / 2 + sideShift;
    x = Math.max(20, Math.min(window.innerWidth - w - 20, x));
    const startY = window.innerHeight * rand(0.18, 0.28);

    const sway = -anchor.sway * 0.6;
    const rise = window.innerHeight * rand(0.5, 0.7);
    const life = rand(11000, 14000);

    e.style.left = x + 'px';
    e.style.top  = startY + 'px';
    e.style.setProperty('--sway', sway + 'px');
    e.style.setProperty('--rise', rise + 'px');
    e.style.setProperty('--life', life + 'ms');
    e.style.visibility = 'visible';
    requestAnimationFrame(() => e.classList.add('lit'));

    setTimeout(() => e.remove(), life + 600);

    const meetX = (anchor.x + anchor.width / 2 + x + w / 2) / 2;
    const meetY = (anchor.startY - anchor.rise * 0.45 + startY + (window.innerHeight * 0.25)) / 2;
    setTimeout(() => heartbeat(meetX, meetY), Math.min(anchor.life, life) * 0.4);
  }

  function heartbeat(x, y) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.style.left = x + 'px';
    h.style.top  = y + 'px';
    stage.appendChild(h);
    setTimeout(() => h.remove(), 2800);
  }

  const MAX_EMBERS = 14;
  function ambient() {
    if (stage.childElementCount >= MAX_EMBERS) return;
    if (document.hidden) return;
    const dot = document.createElement('div');
    dot.className = 'ember you lit';
    dot.textContent = '·';
    dot.style.fontSize = '0.55rem';
    const x = rand(20, window.innerWidth - 20);
    dot.style.left = x + 'px';
    dot.style.top = (window.innerHeight - rand(20, 80)) + 'px';
    dot.style.setProperty('--sway', rand(-40, 40) + 'px');
    dot.style.setProperty('--rise', (window.innerHeight * 0.6) + 'px');
    dot.style.setProperty('--life', rand(9000, 14000) + 'ms');
    stage.appendChild(dot);
    setTimeout(() => dot.remove(), 14500);
  }

  function onLine(raw) {
    const yourEmber = makeYourEmber(raw);
    const t = norm(raw);
    const kind = classify(t);
    const reply = pick(kind, t);
    setTimeout(() => makeMyEmber(reply, yourEmber), 900);
  }

  applyShell();
  buildLangBar();

  line.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
      const v = line.value.trim();
      if (v) onLine(v);
      line.value = '';
      e.preventDefault();
    }
  });

  document.body.addEventListener('click', (e) => {
    if (e.target.closest('#langbar')) return;
    line.focus({ preventScroll: true });
  });

  setTimeout(() => line.focus({ preventScroll: true }), 400);
  witnessLoop();
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ambientGap = reduceMotion ? 6000 : 3600;
  setInterval(ambient, ambientGap);
  for (let i = 0; i < 2; i++) setTimeout(ambient, i * 1000);
})();
</script>
</body>
</html>
