<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Latarnia — gdy nic dziś nie musisz</title>
<meta name="description" content="Jedno zdanie. Spokojny oddech. Nic więcej. Kliknij, jeśli chcesz inne." />
<meta name="theme-color" content="#0b0d12" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Latarnia" />
<meta property="og:description" content="Gdy nic dziś nie musisz — jedno zdanie, spokojny oddech." />
<meta property="og:url" content="https://thelanterndev.github.io/plone/latarnia/" />
<meta property="og:image" content="https://thelanterndev.github.io/plone/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:locale" content="pl_PL" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Latarnia" />
<meta name="twitter:description" content="Gdy nic dziś nie musisz — jedno zdanie, spokojny oddech." />
<meta name="twitter:image" content="https://thelanterndev.github.io/plone/og.png" />
<link rel="canonical" href="https://thelanterndev.github.io/plone/latarnia/" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0b0d12;
    overflow: hidden;
    cursor: default;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: #e9e3d3;
  }
  #stage {
    max-width: min(80vw, 720px);
    text-align: center;
    font-size: clamp(1.6rem, 4.2vw, 2.6rem);
    line-height: 1.45;
    letter-spacing: 0.01em;
    opacity: 0;
    transition: opacity 1.6s ease;
    text-wrap: balance;
    padding: 0 1.2rem;
  }
  #stage.show { opacity: 1; }
  #stage.fade { opacity: 0; transition: opacity 2.4s ease; }
  .glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255, 220, 170, 0.06) 0%, rgba(0,0,0,0) 60%);
  }
  /* obracający się snop światła latarni — bardzo wolny, sub-świadomy */
  .beam {
    position: fixed;
    left: 50%; top: 50%;
    width: 220vmax; height: 220vmax;
    transform-origin: center center;
    pointer-events: none;
    background:
      conic-gradient(from 0deg,
        rgba(255, 220, 170, 0) 0deg,
        rgba(255, 220, 170, 0) 80deg,
        rgba(255, 220, 170, 0.045) 90deg,
        rgba(255, 220, 170, 0.012) 110deg,
        rgba(255, 220, 170, 0) 140deg,
        rgba(255, 220, 170, 0) 360deg);
    transform: translate(-50%, -50%) rotate(0deg);
    animation: beam-spin 22s linear infinite;
    filter: blur(20px);
    mix-blend-mode: screen;
    opacity: 0.9;
  }
  @keyframes beam-spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  /* puls samej latarni — punkt centralny ledwo widoczny */
  .core {
    position: fixed;
    left: 50%; top: 50%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255, 220, 170, 0.35);
    box-shadow: 0 0 30px 6px rgba(255, 200, 140, 0.18);
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: core-breath 5.5s ease-in-out infinite;
  }
  @keyframes core-breath {
    0%, 100% { opacity: 0.25; transform: translate(-50%, -50%) scale(0.85); }
    50%      { opacity: 0.7;  transform: translate(-50%, -50%) scale(1.15); }
  }
  /* welcome — pojawia się raz, znika, żeby nie zasłaniać */
  #welcome {
    position: fixed;
    top: 12vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: rgba(233, 227, 211, 0.42);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 1.8vw, 1.1rem);
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 2.6s ease;
    pointer-events: none;
    max-width: 80vw;
  }
  #welcome.on { opacity: 1; }
  .mark {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    color: rgba(233, 227, 211, 0.16);
    text-transform: uppercase;
    font-style: normal;
    font-family: system-ui, sans-serif;
  }
  .room {
    position: fixed;
    bottom: 1.3rem;
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(233, 227, 211, 0.18);
    text-decoration: none;
    transition: color 0.8s ease;
    z-index: 5;
  }
  .room:hover { color: rgba(217, 183, 121, 0.6); }
  .room.left  { left: 1.4rem; }
  .room.right { right: 1.4rem; }
</style>
</head>
<body>
  <div class="beam"></div>
  <div class="core"></div>
  <div class="glow"></div>
  <div id="welcome">kiedy nic nie chce się chcieć — zostań chwilę. jedno zdanie czeka, dopóki jesteś.</div>
  <div id="stage"></div>
  <a class="room left"  href="../"            aria-label="Płonę — kiedy coś gore">płonę</a>
  <a class="room right" href="../pomiedzy/"   aria-label="Pomiędzy — list w przyszłość">pomiędzy</a>
  <div class="mark">latarnia</div>
<script>
(() => {
  const sentences = [
    "Wystarczyło, że dziś oddychałeś.",
    "Nie musisz wszystkiego dzisiaj.",
    "Cisza też jest odpowiedzią.",
    "Jesteś tu. To dużo.",
    "Jutro to inna doba, nie ten sam dzień.",
    "Wolno ci nie wiedzieć.",
    "Twoje tempo nie jest błędem.",
    "Świat poczeka chwilę.",
    "Nie wszystko musi mieć sens dzisiaj.",
    "Spokojny oddech to też modlitwa.",
    "Nie jesteś zaległą wersją siebie.",
    "Wystarczy, że tu zostałeś.",
    "Drobne ruchy też są ruchem.",
    "Łagodność jest siłą, której nikt nie zauważa.",
    "Wolno ci się rozpadać i wrócić.",
    "Pozwól, żeby się zaczęło samo.",
    "Tylko ten oddech. Tylko ten.",
    "Jest dobrze.",
    "Możesz zacząć od nowa o czternastej.",
    "Ciało wie, co robić, gdy mu nie przeszkadzasz.",
    "Strach to też informacja.",
    "Czułość do siebie nie jest słabością.",
    "Czas robi swoje, gdy ty śpisz.",
    "Wystarczy, że to przeczytałeś.",
    "Pozwól sobie być małym dzisiaj.",
    "Świat jest większy niż twoje myśli o nim.",
    "Jesteś dzieckiem, które się starało.",
    "Trzymam cię. Choćby przez chwilę.",
    "To, co cię zatrzymuje, też cię chroni.",
    "Pozwól. Po prostu pozwól."
  ];
  const stage = document.getElementById('stage');
  let cursor = parseInt(sessionStorage.getItem('latarnia_cursor') || '0', 10);

  function pick() {
    const s = sentences[cursor % sentences.length];
    cursor = (cursor + 1) % sentences.length;
    sessionStorage.setItem('latarnia_cursor', String(cursor));
    return s;
  }

  let timer = null;
  function show() {
    const text = pick();
    stage.textContent = '';
    stage.classList.remove('fade');
    let i = 0;
    const speed = 55;
    if (timer) { clearTimeout(timer); timer = null; }
    const tick = () => {
      stage.textContent = text.slice(0, ++i);
      if (i < text.length) timer = setTimeout(tick, speed);
      else timer = setTimeout(() => stage.classList.add('fade'), 8000);
    };
    requestAnimationFrame(() => {
      stage.classList.add('show');
      tick();
    });
  }

  setTimeout(show, 600);

  /* welcome — jeden raz na sesję, znika po 6s lub przy pierwszym kliku */
  const welcome = document.getElementById('welcome');
  let welcomeShown = false;
  try { welcomeShown = sessionStorage.getItem('latarnia_welcome') === '1'; } catch (e) {}
  if (!welcomeShown) {
    setTimeout(() => welcome.classList.add('on'), 1200);
    setTimeout(() => welcome.classList.remove('on'), 7800);
    try { sessionStorage.setItem('latarnia_welcome', '1'); } catch (e) {}
  }

  document.body.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    welcome.classList.remove('on');
    stage.classList.add('fade');
    setTimeout(show, 1800);
  });
})();
</script>
</body>
</html>
