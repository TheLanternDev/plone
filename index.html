  function detectLang() {
    try {
      const params = new URLSearchParams(location.search);
      const fromUrl = params.get('lang');
      if (fromUrl && LANG[fromUrl]) {
        try { localStorage.setItem('plone_lang', fromUrl); } catch (e) {}
        return fromUrl;
      }
      const stored = localStorage.getItem('plone_lang');
      if (stored && LANG[stored]) return stored;
    } catch (e) {}
    return 'pl';
  }

  const ACTIVE = detectLang();
  const L = LANG[ACTIVE];

  function applyShell() {
    document.documentElement.lang = L.meta.htmlLang;
    document.title = L.meta.title;
    const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
    setMeta('meta[name="description"]', L.meta.description);
    setMeta('meta[property="og:title"]', L.meta.ogTitle);
    setMeta('meta[property="og:description"]', L.meta.ogDescription);
    setMeta('meta[property="og:locale"]', L.meta.ogLocale);
    setMeta('meta[name="twitter:title"]', L.meta.ogTitle);
    setMeta('meta[name="twitter:description"]', L.meta.twitterDescription || L.meta.ogDescription);

    const intro = document.getElementById('intro');
    if (intro) intro.setAttribute('aria-label', L.ui.introAria);

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.textContent = L.ui.welcome;

    const left = document.getElementById('room-left');
    if (left) {
      left.textContent = L.ui.roomLeftLabel;
      left.setAttribute('aria-label', L.ui.roomLeftAria);
    }
    const right = document.getElementById('room-right');
    if (right) {
      right.textContent = L.ui.roomRightLabel;
      right.setAttribute('aria-label', L.ui.roomRightAria);
    }
    const mark = document.getElementById('mark');
    if (mark) mark.textContent = L.ui.mark;

    /* fill all data-i18n elements via dotted path lookup */
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const path = el.getAttribute('data-i18n');
      const parts = path.split('.');
      let v = L;
      for (const p of parts) { v = v && v[p]; }
      if (typeof v === 'string') el.textContent = v;
    });
  }

  function buildLangBar() {
    const bar = document.getElementById('langbar');
    if (!bar) return;
    const order = ['pl', 'en', 'es', 'nl', 'uk'];
    bar.innerHTML = '';
    order.forEach((code, idx) => {
      if (idx > 0) {
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '·';
        bar.appendChild(sep);
      }
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = code;
      b.setAttribute('aria-label', code.toUpperCase());
      if (code === ACTIVE) b.classList.add('on');
      b.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (code === ACTIVE) return;
        try { localStorage.setItem('plone_lang', code); } catch (e) {}
        try { sessionStorage.removeItem('pokoje_intro'); } catch (e) {}
        const url = new URL(location.href);
        url.searchParams.set('lang', code);
        location.href = url.toString();
      });
      bar.appendChild(b);
    });
  }

  applyShell();
  buildLangBar();

  const sentences = L.sentences;
  const stage = document.getElementById('stage');
  const welcome = document.getElementById('welcome');
  const intro = document.getElementById('intro');
  const beam = document.getElementById('beam');
  let cursor = parseInt(sessionStorage.getItem('latarnia_cursor') || '0', 10);
  let mainStarted = false;
  let session = 0;
  let pendingTimers = [];
  function clearPending() {
    for (const id of pendingTimers) clearTimeout(id);
    pendingTimers.length = 0;
  }

  function pick() {
    const s = sentences[cursor % sentences.length];
    cursor = (cursor + 1) % sentences.length;
    try { sessionStorage.setItem('latarnia_cursor', String(cursor)); } catch (e) {}
    return s;
  }
  function show() {
    clearPending();
    const my = ++session;
    const text = pick();
    stage.textContent = '';
    stage.classList.remove('fade');
    let i = 0;
    const speed = 55;
    const tick = () => {
      if (my !== session) return;
      stage.textContent = text.slice(0, ++i);
      if (i < text.length) pendingTimers.push(setTimeout(tick, speed));
      else pendingTimers.push(setTimeout(() => {
        if (my === session) stage.classList.add('fade');
      }, 8000));
    };
    requestAnimationFrame(() => {
      if (my !== session) return;
      stage.classList.add('show');
      tick();
    });
  }
  function fadeThenShow() {
    const my = ++session;
    clearPending();
    stage.classList.add('fade');
    pendingTimers.push(setTimeout(() => {
      if (my !== session) return;
      stage.textContent = '';
      show();
    }, 1700));
  }
  function runWelcome() {
    let wdone = false;
    try { wdone = sessionStorage.getItem('latarnia_welcome_' + ACTIVE) === '1'; } catch (e) {}
    if (wdone) return;
    setTimeout(() => welcome.classList.add('on'), 1200);
    setTimeout(() => welcome.classList.remove('on'), 7800);
    try { sessionStorage.setItem('latarnia_welcome_' + ACTIVE, '1'); } catch (e) {}
  }
  function pulseBeam() {
    beam.classList.add('pulse');
    setTimeout(() => beam.classList.remove('pulse'), 2500);
  }
  let lastClickAt = 0;
  function startMain() {
    if (mainStarted) return;
    mainStarted = true;
    setTimeout(show, 500);
    runWelcome();
    document.body.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      if (e.target.closest('#langbar')) return;
      const now = Date.now();
      if (now - lastClickAt < 600) return;
      lastClickAt = now;
      welcome.classList.remove('on');
      fadeThenShow();
    });
  }
  const seenIntro = (() => { try { return sessionStorage.getItem('pokoje_intro') === '1'; } catch (e) { return false; } })();
  let step = 0;
  function advanceIntro() {
    const steps = intro.querySelectorAll('.step');
    if (step < steps.length - 1) {
      steps[step].classList.remove('on');
      step++;
      steps[step].classList.add('on');
    } else {
      try { sessionStorage.setItem('pokoje_intro', '1'); } catch (e) {}
      intro.classList.add('gone');
      setTimeout(() => intro.remove(), 1600);
      pulseBeam();
      startMain();
    }
  }
  if (seenIntro) {
    intro.remove();
    startMain();
  } else {
    intro.addEventListener('click', (e) => {
      if (e.target.closest('#langbar')) return;
      advanceIntro();
    });
    document.addEventListener('keydown', (e) => {
      if (intro && intro.isConnected && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        advanceIntro();
      }
    });
  }
})();
