<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Latarnia — trzy pokoje: pauza, ogień, list</title>
<meta name="description" content="Latarnia: jedno zdanie na pauzę. Płonę: gdy w środku za gorąco. Pomiędzy: list w czas. Bez konta, bez danych na serwerze.">
<meta name="theme-color" content="#0b0d12">
<meta property="og:type" content="website">
<meta property="og:title" content="Latarnia">
<meta property="og:description" content="Jedno zdanie, spokojny oddech. Potem, jeśli trzeba — Płonę albo Pomiędzy. Nic nie wychodzi w chmurę.">
<meta property="og:url" content="https://thelanterndev.github.io/plone/">
<meta property="og:image" content="https://thelanterndev.github.io/plone/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="pl_PL">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Latarnia">
<meta name="twitter:description" content="Jedno zdanie, spokojny oddech. Potem, jeśli trzeba — Płonę albo Pomiędzy.">
<meta name="twitter:image" content="https://thelanterndev.github.io/plone/og.png">
<link rel="canonical" href="https://thelanterndev.github.io/plone/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg-l:#0b0d12; --bg-p:#050608; --bg-m:#0b0d12;
  --ink:#e9e3d3; --ink-soft:rgba(233,227,211,.62); --ink-faint:rgba(233,227,211,.28);
  --gold:#d9b779;
  --you-bright:rgba(255,210,140,.95); --you-mid:rgba(255,150,70,.85); --you-deep:rgba(220,70,20,.7);
  --me-bright:rgba(255,170,110,.95); --me-mid:rgba(230,90,60,.85); --me-deep:rgba(180,40,20,.65);
  --heart:rgba(255,200,130,.9);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg-l);color:var(--ink);font-family:'Cormorant Garamond','Garamond',serif;font-style:italic;font-weight:300;cursor:default;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{transition:background 1.4s ease;overflow:hidden}
body[data-mode="plone"]{background:var(--bg-p)}
body[data-mode="pomiedzy"]{background:var(--bg-m);font-family:'Inter',system-ui,sans-serif;font-style:normal;overflow:auto;--ink-soft:rgba(233,227,211,.68);--ink-faint:rgba(233,227,211,.36)}
body[data-mode="pomiedzy"]::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(217,183,121,.05) 0%,rgba(0,0,0,0) 55%);pointer-events:none;z-index:0}
body[data-mode="plone"]::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 90%,rgba(255,130,50,.05) 0%,rgba(0,0,0,0) 50%),radial-gradient(ellipse at 70% 10%,rgba(255,100,40,.04) 0%,rgba(0,0,0,0) 55%);pointer-events:none;z-index:0}
.mode{position:fixed;inset:0;display:none;opacity:0;transition:opacity 1.2s ease;z-index:1}
.mode.on{display:block;opacity:1}
.mode.fading{opacity:0}

/* ======= LATARNIA ======= */
#mode-latarnia{display:none;align-items:center;justify-content:center}
#mode-latarnia.on{display:flex}
#stage-l{max-width:min(80vw,720px);text-align:center;font-size:clamp(1.6rem,4.2vw,2.6rem);line-height:1.45;letter-spacing:.01em;opacity:0;transition:opacity 1.4s ease;text-wrap:balance;padding:0 1.2rem;will-change:opacity;contain:layout paint}
#stage-l.show{opacity:1}
#stage-l.fade{opacity:0;transition:opacity 1.6s ease}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,220,170,.06) 0%,rgba(0,0,0,0) 60%);z-index:0}
.beam{position:fixed;left:50%;top:50%;width:140vmax;height:140vmax;transform-origin:center center;pointer-events:none;background:conic-gradient(from 0deg,rgba(255,220,170,0) 0deg,rgba(255,220,170,0) 80deg,rgba(255,220,170,.05) 92deg,rgba(255,220,170,.012) 112deg,rgba(255,220,170,0) 140deg,rgba(255,220,170,0) 360deg);transform:translate(-50%,-50%) rotate(0deg);animation:beam-spin 28s linear infinite;filter:blur(10px);mix-blend-mode:screen;opacity:.85;will-change:transform,opacity;transition:opacity 2.2s ease;z-index:0}
.beam.pulse{opacity:1}
@media(prefers-reduced-motion:reduce){.beam{animation:none;opacity:.5}}
@keyframes beam-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.core{position:fixed;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:rgba(255,220,170,.35);box-shadow:0 0 30px 6px rgba(255,200,140,.18);transform:translate(-50%,-50%);pointer-events:none;animation:core-breath 5.5s ease-in-out infinite;z-index:0}
@keyframes core-breath{0%,100%{opacity:.25;transform:translate(-50%,-50%) scale(.85)}50%{opacity:.7;transform:translate(-50%,-50%) scale(1.15)}}
#welcome{position:fixed;top:12vh;left:50%;transform:translateX(-50%);text-align:center;color:rgba(233,227,211,.52);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.95rem,1.8vw,1.1rem);letter-spacing:.04em;opacity:0;transition:opacity 2.6s ease;pointer-events:none;max-width:80vw;z-index:3}
#welcome.on{opacity:1}
#intro{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(100,130,180,.07) 0%,rgba(11,13,18,.98) 55%,#0b0d12 100%);z-index:100;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:1;transition:opacity 1.6s ease}
#intro.gone{opacity:0;pointer-events:none}
#intro.hidden{display:none}
#intro .panel{max-width:min(86vw,620px);text-align:center;padding:0 1.4rem;color:rgba(233,227,211,.92)}
#intro .step{display:none;animation:step-in 1.2s ease forwards}
#intro .step.on{display:block}
@keyframes step-in{from{opacity:0;transform:translateY(8px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
#intro h2{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(2.1rem,5.4vw,3rem);margin:0 0 1.2rem;letter-spacing:.02em;color:rgba(255,220,200,.92)}
#intro p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.1rem,2.2vw,1.35rem);line-height:1.6;margin:0 0 .5rem;color:rgba(233,227,211,.78)}
#intro p.dim{color:rgba(233,227,211,.52);font-size:clamp(.9rem,1.6vw,1.05rem)}
#intro .rooms{margin:1.1rem 0;display:grid;gap:.45rem;text-align:center}
#intro .rooms b{color:rgba(220,200,170,.95);font-weight:400;margin-right:.35em}
#intro .hint{margin-top:1.8rem;font-family:system-ui,sans-serif;font-style:normal;font-size:.72rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(233,227,211,.38)}

/* ======= PŁONĘ ======= */
#mode-plone{display:none}
#mode-plone.on{display:block}
#witness{position:fixed;top:6vh;left:50%;transform:translateX(-50%);pointer-events:none;text-align:center;z-index:5}
#witness span{display:inline-block;font-size:clamp(1.2rem,2.4vw,1.6rem);color:rgba(233,227,211,.6);opacity:0;transition:opacity 3.5s ease;letter-spacing:.04em;text-shadow:0 0 18px rgba(255,200,140,.08)}
#stage-p{position:fixed;inset:0;pointer-events:none;z-index:2}
.ember{position:absolute;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(.95rem,1.6vw,1.2rem);white-space:pre-wrap;max-width:70vw;text-align:center;pointer-events:none;opacity:0;will-change:transform,opacity,filter}
.ember.you{color:var(--you-bright);text-shadow:0 0 8px rgba(255,180,90,.6),0 0 18px rgba(255,120,40,.4)}
.ember.you.lit{animation:rise-you var(--life) ease-in forwards}
@keyframes rise-you{0%{opacity:0;transform:translate(0,0);filter:blur(0)}8%{opacity:1}50%{opacity:.9;filter:blur(1px);color:var(--you-mid)}80%{opacity:.4;filter:blur(7px);color:var(--you-deep);letter-spacing:.4em}100%{opacity:0;transform:translate(var(--sway),calc(-1 * var(--rise)));filter:blur(20px);letter-spacing:1em}}
.ember.me{color:var(--me-bright);font-weight:400;text-shadow:0 0 10px rgba(255,150,90,.55),0 0 24px rgba(220,70,30,.45),0 0 60px rgba(255,80,20,.18);font-size:clamp(1.05rem,1.8vw,1.35rem)}
.ember.me.lit{animation:fall-me var(--life) ease-out forwards}
@keyframes fall-me{0%{opacity:0;transform:translate(0,calc(-1 * var(--rise) * .4));filter:blur(8px);letter-spacing:.5em}18%{opacity:1;transform:translate(0,0);filter:blur(0);letter-spacing:.02em}65%{opacity:1;color:var(--me-mid)}90%{opacity:.4;color:var(--me-deep);filter:blur(5px);letter-spacing:.3em}100%{opacity:0;transform:translate(var(--sway),calc(var(--rise) * .35));filter:blur(20px);letter-spacing:.8em}}
.heart{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,var(--heart) 0%,rgba(255,130,50,.6) 40%,rgba(0,0,0,0) 75%);pointer-events:none;opacity:0;animation:heart-beat 2.6s ease-out forwards;transform:translate(-50%,-50%) scale(.4)}
@keyframes heart-beat{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);filter:blur(2px)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.4);filter:blur(0)}60%{opacity:.7;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.6);filter:blur(20px)}}
#compose{position:fixed;bottom:8vh;left:50%;transform:translateX(-50%);width:min(82vw,580px);z-index:10;text-align:center}
#line{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(233,227,211,.12);outline:none;color:var(--ink);font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.1rem,2.2vw,1.4rem);text-align:center;padding:.7rem .4rem;caret-color:rgba(255,180,90,.7);transition:border-color 1.2s ease}
#line:focus{border-bottom-color:rgba(255,180,90,.4)}
#line::placeholder{color:rgba(233,227,211,.3);font-style:italic}

/* ======= POMIĘDZY ======= */
#mode-pomiedzy{display:none}
#mode-pomiedzy.on{display:block}
#mode-pomiedzy .wrap{width:100%;max-width:640px;text-align:center;margin:0 auto;padding:4rem 1.2rem clamp(8.5rem,18vh,11rem);font-family:'Inter',system-ui,sans-serif;font-style:normal;position:relative;z-index:2}
#mode-pomiedzy h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(2rem,5vw,2.6rem);margin:0 0 .4rem;letter-spacing:.02em;color:var(--ink)}
#mode-pomiedzy .sub{color:var(--ink-soft);font-size:.95rem;margin:0 0 2rem;letter-spacing:.02em}
#mode-pomiedzy .welcome{color:var(--ink-faint);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;margin:0 0 1.4rem;letter-spacing:.02em;line-height:1.6}
#mode-pomiedzy textarea{width:100%;min-height:220px;background:rgba(255,255,255,.02);border:1px solid var(--ink-faint);border-radius:10px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.15rem;line-height:1.6;padding:1.2rem 1.4rem;resize:vertical;outline:none;transition:border-color .4s ease}
#mode-pomiedzy textarea:focus{border-color:rgba(217,183,121,.45)}
#mode-pomiedzy .row{display:flex;gap:1rem;margin-top:1.2rem;align-items:center;justify-content:center;flex-wrap:wrap}
#mode-pomiedzy label{color:var(--ink-soft);font-size:.85rem;letter-spacing:.06em;text-transform:uppercase}
#mode-pomiedzy input[type="date"]{background:rgba(255,255,255,.02);border:1px solid var(--ink-faint);color:var(--ink);border-radius:8px;padding:.55rem .8rem;font-family:inherit;font-size:.95rem;color-scheme:dark}
#mode-pomiedzy button.primary{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:.7rem 1.6rem;border-radius:999px;font-family:inherit;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .3s ease,color .3s ease;margin-top:1.4rem}
#mode-pomiedzy button.primary:hover{background:var(--gold);color:var(--bg-m)}
#mode-pomiedzy .note{margin-top:2.5rem;margin-left:auto;margin-right:auto;max-width:36rem;color:var(--ink-faint);font-size:.82rem;letter-spacing:.05em;line-height:1.65;font-style:italic;font-family:'Cormorant Garamond',serif}
#mode-pomiedzy .sealed{text-align:center}
#mode-pomiedzy .sealed .glow{width:14px;height:14px;border-radius:50%;background:var(--gold);margin:0 auto 2.4rem;box-shadow:0 0 40px 8px rgba(217,183,121,.3);animation:pulse 4s ease-in-out infinite;position:relative;background-image:none;display:block}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
#mode-pomiedzy .letter{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.2rem,2.8vw,1.6rem);line-height:1.7;color:var(--ink);text-align:left;white-space:pre-wrap;text-wrap:pretty;max-width:580px;margin:0 auto}
#mode-pomiedzy .letter-mark{margin-top:3rem;color:var(--ink-soft);font-size:.74rem;letter-spacing:.38em;text-transform:uppercase}
#mode-pomiedzy .when{color:var(--gold);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-top:.6rem}
#seal-fx{position:fixed;inset:0;pointer-events:none;z-index:50;display:none;align-items:center;justify-content:center}
#seal-fx.on{display:flex}
#seal-fx::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(217,183,121,.22) 0%,rgba(0,0,0,0) 45%);animation:seal-flash 1.6s ease-out forwards}
@keyframes seal-flash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
.stamp{position:relative;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f3d28a 0%,#d9b779 35%,#8a6e3a 100%);box-shadow:0 0 80px 20px rgba(217,183,121,.35),inset 0 -10px 30px rgba(0,0,0,.35),inset 0 8px 18px rgba(255,230,180,.4);display:flex;align-items:center;justify-content:center;color:#2a1f0e;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:3.2rem;transform:scale(.2);opacity:0;animation:stamp-fall 2.4s cubic-bezier(.2,.9,.25,1) forwards}
.stamp::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px dashed rgba(42,31,14,.45)}
@keyframes stamp-fall{0%{transform:scale(.2) rotate(-10deg);opacity:0;filter:blur(6px)}35%{transform:scale(1.25) rotate(2deg);opacity:1;filter:blur(0)}50%{transform:scale(1.05) rotate(0)}80%{transform:scale(1) rotate(0);opacity:1}100%{transform:scale(1.4) rotate(0);opacity:0;filter:blur(8px)}}
.stamp-glyph{position:relative;z-index:1}

/* ======= shared chrome ======= */
.mark{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);font-size:.74rem;letter-spacing:.42em;color:rgba(233,227,211,.3);text-transform:uppercase;font-style:normal;font-family:system-ui,sans-serif;z-index:4;pointer-events:none}
.room{position:fixed;bottom:1.3rem;font-family:system-ui,sans-serif;font-style:normal;font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;color:rgba(233,227,211,.32);text-decoration:none;transition:color .8s ease;z-index:6}
.room:hover,.room:focus-visible{color:rgba(217,183,121,.6);outline:none}
.room.left{left:1.4rem}
.room.right{right:1.4rem}
body[data-mode="plone"] .room:hover{color:rgba(255,200,130,.55)}
#langbar{position:fixed;top:1.1rem;right:1.2rem;z-index:200;display:flex;gap:.05rem;font-family:system-ui,sans-serif;font-style:normal;font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;user-select:none}
#langbar button{background:transparent;border:none;color:rgba(233,227,211,.36);cursor:pointer;padding:.28rem .45rem;font:inherit;letter-spacing:inherit;transition:color .6s ease}
#langbar button:hover,#langbar button:focus-visible{color:rgba(217,183,121,.7);outline:none}
#langbar button.on{color:rgba(217,183,121,.95)}
#langbar .sep{color:rgba(233,227,211,.10);align-self:center;pointer-events:none}
#langbar.hidden{display:none}
@media(max-width:520px){
  .room.left{left:.8rem}.room.right{right:.8rem}#langbar{top:.7rem;right:.7rem}
  .mark{bottom:.6rem}
}
</style>
</head>
<body data-mode="latarnia">
<nav id="langbar" aria-label="Język / language"></nav>

<section class="mode" id="mode-latarnia">
  <div class="beam" id="beam"></div>
  <div class="core"></div>
  <div class="glow"></div>
  <div id="welcome"></div>
  <div id="stage-l"></div>
  <a class="room left"  href="#/plone"    id="room-l-left"></a>
  <a class="room right" href="#/pomiedzy" id="room-l-right"></a>
</section>

<div id="intro" class="hidden" role="dialog" aria-label="" aria-modal="true">
  <div class="panel">
    <div class="step on" data-step="0">
      <h2 data-i18n="intro.step0.h2">Latarnia</h2>
      <p data-i18n="intro.step0.p1"></p>
      <p class="dim" data-i18n="intro.step0.p2"></p>
      <div class="hint" data-i18n="intro.step0.hint"></div>
    </div>
    <div class="step" data-step="1">
      <h2 data-i18n="intro.step1.h2"></h2>
      <p data-i18n="intro.step1.p1"></p>
      <div class="rooms">
        <div><b data-i18n="intro.step1.r1.name"></b><span data-i18n="intro.step1.r1.text"></span></div>
        <div><b data-i18n="intro.step1.r2.name"></b><span data-i18n="intro.step1.r2.text"></span></div>
        <div><b data-i18n="intro.step1.r3.name"></b><span data-i18n="intro.step1.r3.text"></span></div>
      </div>
      <p class="dim" data-i18n="intro.step1.p2"></p>
      <div class="hint" data-i18n="intro.step1.hint"></div>
    </div>
  </div>
</div>

<section class="mode" id="mode-plone">
  <div id="witness"><span id="word"></span></div>
  <div id="stage-p"></div>
  <div id="compose">
    <input id="line" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="send" inputmode="text" aria-label="">
  </div>
  <a class="room left"  href="#/"          id="room-p-left"></a>
  <a class="room right" href="#/pomiedzy"  id="room-p-right"></a>
</section>

<section class="mode" id="mode-pomiedzy">
  <div class="wrap" id="root"></div>
  <div id="seal-fx" aria-hidden="true"><div class="stamp"><span class="stamp-glyph">P</span></div></div>
  <a class="room left"  href="#/plone" id="room-pm-left"></a>
  <a class="room right" href="#/"      id="room-pm-right"></a>
</section>

<div class="mark" id="mark"></div>

<script>
const SEALED_PAYLOAD = null;
const SEALED_LANG = null;
const PRISTINE_SOURCE = document.documentElement.outerHTML;
const POM_KEY_PEPPER = 'pomiedzy:v2';

const LANG = {};

LANG.pl = {
  meta: {
    htmlLang: 'pl', ogLocale: 'pl_PL', dateLocale: 'pl-PL',
    latarnia: { title:'Latarnia — trzy pokoje: pauza, ogień, list', description:'Latarnia: jedno zdanie na pauzę. Płonę: gdy w środku za gorąco. Pomiędzy: list w czas. Bez konta, bez danych na serwerze.', ogTitle:'Latarnia', ogDescription:'Jedno zdanie, spokojny oddech. Potem, jeśli trzeba — Płonę albo Pomiędzy. Nic nie wychodzi w chmurę.', twitterDescription:'Jedno zdanie, spokojny oddech. Potem, jeśli trzeba — Płonę albo Pomiędzy.' },
    plone:    { title:'Płonę — miejsce, gdzie pisze się to, co się pali', description:'Tu jest ciemno i ktoś czyta. Napisz, co chcesz żeby dziś w Tobie spłonęło. Bez konta, bez śladu, bez bitu.', ogTitle:'Płonę', ogDescription:'Kiedy coś gore — pisz tu. Tu jest ciemno i ktoś czyta.' },
    pomiedzy: { title:'Pomiędzy — list do siebie w przyszłość', description:'Napisz, zaplombuj. Plik wraca do ciebie w wybranym dniu. Nic nie wychodzi z tej strony.', ogTitle:'Pomiędzy', ogDescription:'List do siebie. Otworzy się dopiero w wybranym dniu.' }
  },
  ui: {
    langAria: 'Język / language',
    latarnia: { mark:'latarnia', introAria:'Wprowadzenie', roomLeftLabel:'płonę', roomLeftAria:'Płonę — wypal słowem', roomRightLabel:'pomiędzy', roomRightAria:'Pomiędzy — list do siebie' },
    plone:    { mark:'płonę', placeholder:'Co dzisiaj spłonie?', ariaInput:'Napisz to, co chcesz żeby spłonęło', roomLeftLabel:'latarnia', roomLeftAria:'Latarnia — pauza, jedno zdanie', roomRightLabel:'pomiędzy', roomRightAria:'Pomiędzy — list do siebie w przyszłość' },
    pomiedzy: { mark:'pomiędzy', roomLeftLabel:'płonę', roomLeftAria:'Płonę — wypal słowem', roomRightLabel:'latarnia', roomRightAria:'Latarnia — pauza, jedno zdanie' }
  },
  latarnia: {

      [/^тримаюсь\.?$|якось тримаюсь/, "Тримаєшся. Я тримаю поруч."],

  if (L.plone && Array.isArray(L.plone.specificRules)){
    const ex = EXTRA_RULES[ACTIVE] || [];

    L.plone.specificRules = ex.concat(L.plone.specificRules);

  /* =========================================================
     hash router — #/, #/plone, #/pomiedzy
     ========================================================= */
  const VALID = new Set(['latarnia','plone','pomiedzy']);
  function hashToMode(){
    if (SEALED_PAYLOAD) return 'pomiedzy';
    const h = (location.hash || '#/').replace(/^#\/?/, '').replace(/\/$/, '').toLowerCase();
    if (h === '' || h === 'latarnia') return 'latarnia';
    if (VALID.has(h)) return h;
    return 'latarnia';
  }

  /* =========================================================
     meta — per-mode title/og/canonical
     ========================================================= */
  const ORIGIN = 'https://thelanterndev.github.io/plone';
  function modeMeta(mode){
    const m = L.meta[mode] || L.meta.latarnia;
    const path = mode === 'latarnia' ? '/' : '/' + mode + '/';
    return Object.assign({ url: ORIGIN + path }, m);
  }
  function setMeta(sel, val){
    const el = document.querySelector(sel);
    if (el && val != null) el.setAttribute('content', val);
  }
  function applyMeta(mode){
    const m = modeMeta(mode);
    document.documentElement.lang = L.meta.htmlLang;
    document.title = m.title;
    setMeta('meta[name="description"]', m.description);
    setMeta('meta[property="og:title"]', m.ogTitle);
    setMeta('meta[property="og:description"]', m.ogDescription);
    setMeta('meta[property="og:locale"]', L.meta.ogLocale);
    setMeta('meta[property="og:url"]', m.url);
    setMeta('meta[name="twitter:title"]', m.ogTitle);
    setMeta('meta[name="twitter:description"]', m.twitterDescription || m.ogDescription);
    const can = document.querySelector('link[rel="canonical"]');
    if (can) can.setAttribute('href', m.url);
    const tm = document.getElementById('mark');
    if (tm) tm.textContent = (L.ui[mode] && L.ui[mode].mark) || L.meta.ogTitle.toLowerCase();
  }

  /* =========================================================
     room labels + langbar — applied once
     ========================================================= */
  function applyLabels(){
    function setLink(id, label, aria){
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = label;
      el.setAttribute('aria-label', aria || label);
    }
    setLink('room-l-left',  L.ui.latarnia.roomLeftLabel,  L.ui.latarnia.roomLeftAria);
    setLink('room-l-right', L.ui.latarnia.roomRightLabel, L.ui.latarnia.roomRightAria);
    setLink('room-p-left',  L.ui.plone.roomLeftLabel,     L.ui.plone.roomLeftAria);
    setLink('room-p-right', L.ui.plone.roomRightLabel,    L.ui.plone.roomRightAria);
    setLink('room-pm-left', L.ui.pomiedzy.roomLeftLabel,  L.ui.pomiedzy.roomLeftAria);
    setLink('room-pm-right',L.ui.pomiedzy.roomRightLabel, L.ui.pomiedzy.roomRightAria);
    const line = document.getElementById('line');
    if (line){ line.placeholder = L.ui.plone.placeholder; line.setAttribute('aria-label', L.ui.plone.ariaInput || L.ui.plone.placeholder); }
    /* intro i18n */
    document.querySelectorAll('#intro [data-i18n]').forEach(el=>{
      const path = el.getAttribute('data-i18n').split('.');
      let v = L.latarnia;
      for (const p of path) v = v && v[p];
      if (typeof v === 'string') el.textContent = v;
    });
    const intro = document.getElementById('intro');
    if (intro) intro.setAttribute('aria-label', L.ui.latarnia.introAria || '');
    const bar = document.getElementById('langbar');
    if (bar) bar.setAttribute('aria-label', L.ui.langAria || 'Język / language');
  }

  function buildLangBar(){
    const bar = document.getElementById('langbar');
    if (!bar) return;
    if (SEALED_PAYLOAD){ bar.classList.add('hidden'); return; }
    const order = ['pl','en','es','nl','uk'];
    bar.innerHTML = '';
    order.forEach((code, idx) => {
      if (idx > 0){
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '·';
        bar.appendChild(sep);
      }
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = code;
      b.setAttribute('aria-label', code.toUpperCase());
      if (code === ACTIVE) b.classList.add('on');
      b.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (code === ACTIVE) return;
        try{ localStorage.setItem('plone_lang', code);}catch(e){}
        try{ sessionStorage.removeItem('pokoje_intro');}catch(e){}
        const url = new URL(location.href);
        url.searchParams.set('lang', code);
        location.href = url.toString();
      });
      bar.appendChild(b);
    });
  }

  /* =========================================================
     LATARNIA — sentences, intro, ambient beam
     ========================================================= */
  const Latarnia = (() => {
    const stage = document.getElementById('stage-l');
    const welcome = document.getElementById('welcome');
    const beam = document.getElementById('beam');
    const intro = document.getElementById('intro');
    let cursor = parseInt(sessionStorage.getItem('latarnia_cursor') || '0', 10);
    let session = 0;
    let pendingTimers = [];
    let started = false, active = false;
    let bodyClickHandler = null, keyHandler = null;

    function clearPending(){
      for (const id of pendingTimers) clearTimeout(id);
      pendingTimers.length = 0;
    }
    function pick(){
      const arr = L.latarnia.sentences;
      const s = arr[cursor % arr.length];
      cursor = (cursor + 1) % arr.length;
      try{ sessionStorage.setItem('latarnia_cursor', String(cursor));}catch(e){}
      return s;
    }
    function show(){
      clearPending();
      const my = ++session;
      const text = pick();
      stage.textContent = '';
      stage.classList.remove('fade');
      let i = 0;
      const tick = () => {
        if (my !== session || !active) return;
        stage.textContent = text.slice(0, ++i);
        if (i < text.length) pendingTimers.push(setTimeout(tick, 55));
        else pendingTimers.push(setTimeout(() => {
          if (my === session && active) stage.classList.add('fade');
        }, 8000));
      };
      requestAnimationFrame(() => {
        if (my !== session || !active) return;
        stage.classList.add('show');
        tick();
      });
    }
    function fadeThenShow(){
      const my = ++session;
      clearPending();
      stage.classList.add('fade');
      pendingTimers.push(setTimeout(() => {
        if (my !== session || !active) return;
        stage.textContent = '';
        show();
      }, 1700));
    }
    function runWelcome(){
      let done = false;
      try{ done = sessionStorage.getItem('latarnia_welcome_' + ACTIVE) === '1';}catch(e){}
      if (done) return;
      pendingTimers.push(setTimeout(() => welcome.classList.add('on'), 1200));
      pendingTimers.push(setTimeout(() => welcome.classList.remove('on'), 7800));
      try{ sessionStorage.setItem('latarnia_welcome_' + ACTIVE, '1');}catch(e){}
    }
    function pulseBeam(){
      beam.classList.add('pulse');
      pendingTimers.push(setTimeout(() => beam.classList.remove('pulse'), 2500));
    }

    let lastClickAt = 0;
    function startMain(){
      if (started) return;
      started = true;
      pendingTimers.push(setTimeout(show, 500));
      runWelcome();
      bodyClickHandler = (e) => {
        if (!active) return;
        if (e.target.closest('a')) return;
        if (e.target.closest('#langbar')) return;
        if (e.target.closest('#mode-plone')) return;
        if (e.target.closest('#mode-pomiedzy')) return;
        const now = Date.now();
        if (now - lastClickAt < 600) return;
        lastClickAt = now;
        welcome.classList.remove('on');
        fadeThenShow();
      };
      document.body.addEventListener('click', bodyClickHandler);
    }

    function showIntroIfNeeded(){
      if (SEALED_PAYLOAD){ intro.classList.add('hidden'); return false; }
      const seen = (() => { try{ return sessionStorage.getItem('pokoje_intro') === '1';}catch(e){ return false;}})();
      if (seen){ intro.classList.add('hidden'); return false; }
      intro.classList.remove('hidden');
      let step = 0;
      function advance(){
        const steps = intro.querySelectorAll('.step');
        if (step < steps.length - 1){
          steps[step].classList.remove('on');
          step++;
          steps[step].classList.add('on');
        } else {
          try{ sessionStorage.setItem('pokoje_intro', '1');}catch(e){}
          intro.classList.add('gone');
          setTimeout(() => intro.classList.add('hidden'), 1600);
          pulseBeam();
          startMain();
        }
      }
      const introClick = (e) => {
        if (e.target.closest('#langbar')) return;
        advance();
      };
      intro.addEventListener('click', introClick);
      keyHandler = (e) => {
        if (intro.classList.contains('hidden') || intro.classList.contains('gone')) return;
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          advance();
        }
      };
      document.addEventListener('keydown', keyHandler);
      return true;
    }

    return {
      activate(){
        active = true;
        if (!started){
          if (!showIntroIfNeeded()) startMain();
        } else {
          /* coming back — refresh stage if hidden */
          if (!stage.classList.contains('show')) show();
        }
      },
      deactivate(){
        active = false;
        clearPending();
        welcome.classList.remove('on');
      }
    };
  })();

  /* =========================================================
     PŁONĘ — embers, witness, classifier, replies
     ========================================================= */
  const Plone = (() => {
    const stage = document.getElementById('stage-p');
    const wordEl = document.getElementById('word');
    const line = document.getElementById('line');
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const rand = (a,b) => a + Math.random() * (b - a);
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

    let active = false;
    let witnessRunning = false;
    let ambientId = null;
    let timers = [];

    function norm(s){
      return (s || '').toLowerCase().normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/ł/g,'l').replace(/Ł/g,'l')
        .replace(/ñ/g,'n').replace(/Ñ/g,'n')
        .replace(/[¡¿]/g,'')
        .replace(/[^\p{L}\p{N}\s?!]/gu,' ')
        .replace(/\s+/g,' ').trim();
    }
    /* relaxed second-pass cues — kick in only when primary classifier returns 'default'.
       Lets short fragments still land a real category instead of canned defaults. */
    const RELAXED = [
      ['exhaust',  /\b(zmecz|wycz|ledw|tired|cooked|fatal|moe|kapot|opgebrand|втом|вижат|вимотан)\b/],
      ['anger',    /\b(wkurz|wsciek|kurw|jeb|fuck|shit|cabrear|baal|woed|зл|лют|нена)\b/],
      ['fear',     /\b(boj|stra|scared|afraid|miedo|angst|bang|стра|боюс)\b/],
      ['alone',    /\b(sam|lonely|alone|solo|sola|alleen|сам|один)\b/],
      ['shame',    /\b(wstyd|shame|verguenza|cringe|krindz|сором|кринж)\b/],
      ['precious', /\b(love|kocham|amo|hou van|люблю|кохаю|tata|tato|mama|mom|dad|mum|папа|мама)\b/],
      ['void',     /\b(empty|pust|nada|leeg|порожн)\b/]
    ];
    function classify(t){
      if (t.length <= 4) return 'short';
      const cls = (L.plone && L.plone.classifier) || [];
      for (const [cat, re] of cls){
        if (re.test(t)) return cat;
      }
      for (const [cat, re] of RELAXED){
        if (re.test(t)) return cat;
      }
      return 'default';
    }

    /* session rotation: avoid last 8 replies; per-kind cursor; rationable slang */
    const recent = [];
    const RECENT_MAX = 8;
    const kindCursor = {};
    let lastReply = '';
    let slangStreak = 0;
    function tryRule(t){
      const rules = (L.plone && L.plone.specificRules) || [];
      const isShort = t.length <= 12;
      for (const [re, reply] of rules){
        if (re.test(t)){
          if (recent.includes(reply)) continue;
          /* dose-limit: after two slang-shaped specifics in a row, skip rule and let pool reply */
          if (slangStreak >= 2 && isShort) continue;
          return reply;
        }
      }
      return null;
    }
    function pickFromPool(kind){
      const pools = (L.plone && L.plone.answers) || {};
      const pool = pools[kind] || pools.default || ['…'];
      let cursor = kindCursor[kind] || 0;
      for (let attempt = 0; attempt < pool.length; attempt++){
        const candidate = pool[(cursor + attempt) % pool.length];
        if (candidate !== lastReply && !recent.includes(candidate)){
          kindCursor[kind] = (cursor + attempt + 1) % pool.length;
          return candidate;
        }
      }
      const fallback = pool[cursor % pool.length];
      kindCursor[kind] = (cursor + 1) % pool.length;
      return fallback;
    }
    function pick(kind, t){
      const ruleReply = tryRule(t);
      let reply;
      if (ruleReply){ reply = ruleReply; slangStreak++; }
      else { reply = pickFromPool(kind); slangStreak = 0; }
      lastReply = reply;
      recent.push(reply);
      if (recent.length > RECENT_MAX) recent.shift();
      return reply;
    }

    let witnessIdx = 0;
    async function witnessLoop(){
      if (witnessRunning) return;
      witnessRunning = true;
      const ws = (L.plone && L.plone.witness) || [];
      let last = '';
      while (witnessRunning && active){
        if (!ws.length){ break; }
        let w;
        let tries = 0;
        do { w = ws[Math.floor(Math.random() * ws.length)]; tries++; }
        while (w === last && ws.length > 1 && tries < 5);
        last = w;
        wordEl.textContent = w;
        await sleep(50);
        if (!active) break;
        wordEl.style.opacity = '0.6';
        await sleep(rand(4500, 7000));
        if (!active) break;
        wordEl.style.opacity = '0';
        await sleep(rand(8000, 15000));
      }
      witnessRunning = false;
      wordEl.style.opacity = '0';
    }

    function makeYourEmber(text){
      const e = document.createElement('div');
      e.className = 'ember you';
      e.textContent = text;
      e.style.visibility = 'hidden';
      stage.appendChild(e);
      const w = e.offsetWidth;
      const margin = 24;
      const maxX = Math.max(margin, window.innerWidth - w - margin);
      const x = rand(margin, maxX);
      const startY = window.innerHeight - rand(160, 230);
      const sway = rand(-80, 80);
      const rise = window.innerHeight * rand(0.85, 1.05);
      const life = rand(13000, 18000);
      e.style.left = x + 'px';
      e.style.top = startY + 'px';
      e.style.setProperty('--sway', sway + 'px');
      e.style.setProperty('--rise', rise + 'px');
      e.style.setProperty('--life', life + 'ms');
      e.style.visibility = 'visible';
      requestAnimationFrame(() => e.classList.add('lit'));
      const t = setTimeout(() => e.remove(), life + 600);
      timers.push(t);
      return { x, startY, sway, rise, life, width: w };
    }
    function makeMyEmber(text, anchor){
      const e = document.createElement('div');
      e.className = 'ember me';
      e.textContent = text;
      e.style.visibility = 'hidden';
      stage.appendChild(e);
      const w = e.offsetWidth;
      const sideShift = (Math.random() < 0.5 ? -1 : 1) * rand(40, 130);
      let x = anchor.x + (anchor.width - w) / 2 + sideShift;
      x = Math.max(20, Math.min(window.innerWidth - w - 20, x));
      const startY = window.innerHeight * rand(0.18, 0.28);
      const sway = -anchor.sway * 0.6;
      const rise = window.innerHeight * rand(0.5, 0.7);
      const life = rand(11000, 14000);
      e.style.left = x + 'px';
      e.style.top = startY + 'px';
      e.style.setProperty('--sway', sway + 'px');
      e.style.setProperty('--rise', rise + 'px');
      e.style.setProperty('--life', life + 'ms');
      e.style.visibility = 'visible';
      requestAnimationFrame(() => e.classList.add('lit'));
      const t1 = setTimeout(() => e.remove(), life + 600);
      const meetX = (anchor.x + anchor.width / 2 + x + w / 2) / 2;
      const meetY = (anchor.startY - anchor.rise * 0.45 + startY + (window.innerHeight * 0.25)) / 2;
      const t2 = setTimeout(() => heartbeat(meetX, meetY), Math.min(anchor.life, life) * 0.4);
      timers.push(t1, t2);
    }
    function heartbeat(x, y){
      if (!active) return;
      const h = document.createElement('div');
      h.className = 'heart';
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      stage.appendChild(h);
      const t = setTimeout(() => h.remove(), 2800);
      timers.push(t);
    }
    const MAX_EMBERS = 14;
    function ambient(){
      if (!active) return;
      if (stage.childElementCount >= MAX_EMBERS) return;
      if (document.hidden) return;
      const dot = document.createElement('div');
      dot.className = 'ember you lit';
      dot.textContent = '·';
      dot.style.fontSize = '0.55rem';
      const x = rand(20, window.innerWidth - 20);
      dot.style.left = x + 'px';
      dot.style.top = (window.innerHeight - rand(20, 80)) + 'px';
      dot.style.setProperty('--sway', rand(-40, 40) + 'px');
      dot.style.setProperty('--rise', (window.innerHeight * 0.6) + 'px');
      dot.style.setProperty('--life', rand(9000, 14000) + 'ms');
      stage.appendChild(dot);
      const t = setTimeout(() => dot.remove(), 14500);
      timers.push(t);
    }
    function onLine(raw){
      const yourEmber = makeYourEmber(raw);
      const t = norm(raw);
      const kind = classify(t);
      const reply = pick(kind, t);
      const id = setTimeout(() => makeMyEmber(reply, yourEmber), 900);
      timers.push(id);
    }
    let keyHandler = null, clickHandler = null;
    function bind(){
      if (keyHandler) return;
      keyHandler = (e) => {
        if (!active) return;
        if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229){
          const v = line.value.trim();
          if (v) onLine(v);
          line.value = '';
          e.preventDefault();
        }
      };
      line.addEventListener('keydown', keyHandler);
      clickHandler = (e) => {
        if (!active) return;
        if (e.target.closest('#langbar')) return;
        if (e.target.closest('a.room')) return;
        line.focus({ preventScroll: true });
      };
      document.getElementById('mode-plone').addEventListener('click', clickHandler);
    }

    return {
      activate(){
        active = true;
        bind();
        setTimeout(() => { if (active) line.focus({ preventScroll: true }); }, 300);
        if (!witnessRunning) witnessLoop();
        if (!ambientId){
          const gap = reduceMotion ? 6000 : 3600;
          ambientId = setInterval(ambient, gap);
          for (let i = 0; i < 2; i++) timers.push(setTimeout(ambient, i * 1000));
        }
      },
      deactivate(){
        active = false;
        if (ambientId){ clearInterval(ambientId); ambientId = null; }
        for (const id of timers) clearTimeout(id);
        timers.length = 0;
        /* strand any in-flight embers/hearts so they don't pile up across mode switches */
        while (stage.firstChild) stage.removeChild(stage.firstChild);
        wordEl.style.opacity = '0';
      }
    };
  })();

  /* =========================================================
     POMIĘDZY — sealed letter
     ========================================================= */
  const Pomiedzy = (() => {
    const root = document.getElementById('root');
    let active = false, mounted = false;
    let typeTimer = null;

    function xor(text, key){
      let out = '';
      for (let i = 0; i < text.length; i++){
        out += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return out;
    }
    const xorKeyV2 = iso => iso + '|' + POM_KEY_PEPPER;
    const toB64 = s => btoa(unescape(encodeURIComponent(s)));
    const fromB64 = s => decodeURIComponent(escape(atob(s)));
    function fmtDate(iso){
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString(L.meta.dateLocale, { year:'numeric', month:'long', day:'numeric' });
    }

    function renderCreate(){
      const c = L.pomiedzy.create;
      root.innerHTML =
        '<h1></h1>' +
        '<p class="sub"></p>' +
        '<p class="welcome"></p>' +
        '<textarea id="letter" aria-label=""></textarea>' +
        '<div class="row"><label for="when"></label><input type="date" id="when"></div>' +
        '<button id="seal" class="primary"></button>' +
        '<p class="note"><span class="n1"></span><br><span class="n2"></span></p>';
      root.querySelector('h1').textContent = c.h1;
      root.querySelector('.sub').textContent = c.sub;
      root.querySelector('.welcome').textContent = c.welcome;
      const ta = root.querySelector('#letter');
      ta.placeholder = c.placeholder;
      ta.setAttribute('aria-label', c.placeholder);
      root.querySelector('label').textContent = c.whenLabel;
      const when = document.getElementById('when');
      const today = new Date();
      const inOneYear = new Date(today);
      inOneYear.setFullYear(today.getFullYear() + 1);
      when.value = inOneYear.toISOString().slice(0,10);
      when.min = today.toISOString().slice(0,10);
      const btn = root.querySelector('#seal');
      btn.textContent = c.button;
      root.querySelector('.note .n1').textContent = c.noteLine1;
      root.querySelector('.note .n2').textContent = c.noteLine2;
      btn.addEventListener('click', seal);
    }
    async function seal(){
      const ta = root.querySelector('#letter');
      const text = ta.value.trim();
      const when = document.getElementById('when').value;
      if (!text){ ta.focus(); return; }
      if (!when) return;
      const fx = document.getElementById('seal-fx');
      fx.classList.add('on');
      await new Promise(r => setTimeout(r, 1100));
      const cipher = toB64(xor(text, xorKeyV2(when)));
      const payload = { v:2, c: cipher, d: when, sealed_at: new Date().toISOString().slice(0,10) };
      const html = currentSourceWithPayload(payload, ACTIVE);
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '.pomiedzy-' + when + '.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      await new Promise(r => setTimeout(r, 1300));
      fx.classList.remove('on');
      const s = L.pomiedzy.sealed;
      root.innerHTML =
        '<h1></h1>' +
        '<p class="sub"></p>' +
        '<div class="when"></div>' +
        '<p class="note"><span class="n1"></span><br><span class="n2"></span></p>';
      root.querySelector('h1').textContent = s.h1;
      root.querySelector('.sub').textContent = s.sub;
      root.querySelector('.when').textContent = s.whenPrefix + fmtDate(when);
      root.querySelector('.note .n1').textContent = s.noteLine1;
      root.querySelector('.note .n2').textContent = s.noteLine2;
    }
    function currentSourceWithPayload(payload, lang){
      const json = JSON.stringify(payload).replace(/</g, '\\u003c');
      const langJson = JSON.stringify(lang);
      let src = PRISTINE_SOURCE.replace(
        'const SEALED_PAYLOAD = null;',
        'const SEALED_PAYLOAD = ' + json + ';'
      );
      src = src.replace(
        'const SEALED_LANG = null;',
        'const SEALED_LANG = ' + langJson + ';'
      );
      return '<!doctype html>\n' + src;
    }
    function renderSealed(payload){
      const today = new Date();
      const open = new Date(payload.d + 'T00:00:00');
      const d0 = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
      if (d0(today) < d0(open)){
        const ny = L.pomiedzy.notYet;
        root.innerHTML = '<div class="sealed"><div class="glow"></div><h1></h1><div class="when"></div><div class="letter-mark"></div></div>';
        root.querySelector('h1').textContent = ny.h1;
        root.querySelector('.when').textContent = ny.whenPrefix + fmtDate(payload.d);
        root.querySelector('.letter-mark').textContent = L.ui.pomiedzy.mark;
        return;
      }
      let plain = '';
      try{
        if (payload.v === 2 && payload.c) plain = xor(fromB64(payload.c), xorKeyV2(payload.d));
        else if (payload.c) plain = xor(fromB64(payload.c), payload.d);
      } catch(e){ plain = L.pomiedzy.err.read; }
      root.innerHTML = '<div class="sealed"><div class="glow"></div><div class="letter" id="letter-out"></div><div class="letter-mark"></div></div>';
      root.querySelector('.letter-mark').textContent = L.pomiedzy.opened.prefix + new Date().toLocaleDateString(L.meta.dateLocale);
      const el = document.getElementById('letter-out');
      let i = 0;
      function tick(){
        if (!active) return;
        el.textContent = plain.slice(0, ++i);
        if (i < plain.length) typeTimer = setTimeout(tick, 28);
      }
      typeTimer = setTimeout(tick, 1200);
    }
    return {
      activate(){
        active = true;
        if (!mounted){
          mounted = true;
          if (SEALED_PAYLOAD) renderSealed(SEALED_PAYLOAD);
          else renderCreate();
        }
      },
      deactivate(){
        active = false;
        if (typeTimer){ clearTimeout(typeTimer); typeTimer = null; }
      }
    };
  })();

  /* =========================================================
     mode switching with fade
     ========================================================= */
  let currentMode = null;
  const sections = {
    latarnia: document.getElementById('mode-latarnia'),
    plone:    document.getElementById('mode-plone'),
    pomiedzy: document.getElementById('mode-pomiedzy')
  };
  const handlers = { latarnia: Latarnia, plone: Plone, pomiedzy: Pomiedzy };

  function switchMode(next){
    if (!VALID.has(next)) next = 'latarnia';
    if (next === currentMode) return;
    const prev = currentMode;
    /* fade out previous */
    if (prev && sections[prev]){
      sections[prev].classList.add('fading');
      handlers[prev].deactivate();
      setTimeout(() => {
        sections[prev].classList.remove('on');
        sections[prev].classList.remove('fading');
      }, 380);
    }
    /* set body mode immediately so background transitions */
    document.body.setAttribute('data-mode', next);
    applyMeta(next);
    /* show next */
    setTimeout(() => {
      sections[next].classList.add('on');
      handlers[next].activate();
    }, prev ? 200 : 0);
    currentMode = next;
  }

  /* =========================================================
     init
     ========================================================= */
  applyLabels();
  buildLangBar();

  const initialMode = hashToMode();
  switchMode(initialMode);

  window.addEventListener('hashchange', () => {
    if (SEALED_PAYLOAD) return;
    switchMode(hashToMode());
  });

  /* clean up if page hidden too long (prevents runaway timers in mobile bg) */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden){
      // do nothing — animations naturally pause
    }
  });
})();
</script>
</body>
</html>
