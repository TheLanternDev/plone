<style>
  :root {
    --bg: #050608;
    --ink: #e9e3d3;
    --you-bright: rgba(255, 210, 140, 0.95);
    --you-mid: rgba(255, 150, 70, 0.85);
    --you-deep: rgba(220, 70, 20, 0.7);
    --me-bright: rgba(255, 170, 110, 0.95);
    --me-mid:    rgba(230,  90,  60, 0.85);
    --me-deep:   rgba(180,  40,  20, 0.65);

  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    cursor: default;

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 90%, rgba(255, 130, 50, 0.05) 0%, rgba(0,0,0,0) 50%),
      radial-gradient(ellipse at 70% 10%, rgba(255, 100, 40, 0.04) 0%, rgba(0,0,0,0) 55%);
    pointer-events: none;
  }
  #witness {
    position: fixed;
    top: 6vh;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;

    animation: fall-me var(--life) ease-out forwards;

    0%   { opacity: 0; transform: translate(0, calc(-1 * var(--rise) * 0.4)); filter: blur(8px); letter-spacing: 0.5em; }
    18%  { opacity: 1; transform: translate(0, 0); filter: blur(0); letter-spacing: 0.02em; }
    65%  { opacity: 1; color: var(--me-mid); }
    90%  { opacity: 0.4; color: var(--me-deep); filter: blur(5px); letter-spacing: 0.3em; }

  .heart {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--heart) 0%, rgba(255, 130, 50, 0.6) 40%, rgba(0,0,0,0) 75%);

    opacity: 0;

    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); filter: blur(2px); }

    60%  { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }

    position: fixed;

    left: 50%;

  #mark {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: rgba(233, 227, 211, 0.08);
    text-transform: uppercase;
    pointer-events: none;

</style>
</head>
<body>

<script>
(() => {
  /* ===========================================================
     Witness — quiet words from above.

  const witnessWords = [

    ],
    // maska, „muszę być kimś”, gram dla nich, udaję

      "Zdejmij maskę choć tu. Tu nikt nie żąda manier królewskich.",

      "Nie graj. Nie ze mną. Tu jestem ja, i tu jesteś ty — bez bitu, bez sceny.",

    ],
    // domyślne
    default: [
      "Mów dalej.",
      "Słyszę cię. Pal dalej.",
      "Co jeszcze?",
      "Tu jestem.",

  /* ===========================================================
     norm() — Polish-robust normalizer for matching.
     Strips diacritics, lowercases, collapses whitespace, removes
     trailing punctuation. Used ONLY for pattern matching, never
     for displaying anything to the user.
     =========================================================== */
  function norm(s) {
    return (s || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/ł/g, 'l').replace(/Ł/g, 'l')
      .replace(/[^\p{L}\p{N}\s?!]/gu, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  /* ===========================================================
     Classifier — what kind of fire is this line?
     Operates on normalized (no-diacritic) text so the user can
     type without polish characters and still be heard.
     =========================================================== */
  function classify(t) {
    if (t.length <= 4) return 'short';

    if (/(wstyd|zawstydz|kompromit|zenuj|zenad)/.test(t))                                  return 'shame';
    if (/(pustk|nic nie czuj|martwo|znieczul|odretw)/.test(t))                              return 'void';
    if (/[?]/.test(t))                                                                      return 'question';
    if (/^(dlacz|jak |czemu|po co|po cholere|co mam|kto |kiedy |gdzie |czy )/.test(t))      return 'question';
    if (/(kurwa|wkurz|nienawi|wsciek|jeba|pierdol|chuj|gown|dosc mam|mam dosyc ich)/.test(t)) return 'anger';
    if (/(boje|boi |strach|straszn|niepoko|przeraz|panik|co jesli|a jesli|a jak |nie dam rady|nie zdol|drzy)/.test(t)) return 'fear';
    if (/(jestem (do|niczeg|pust|slab|glup|niczy|chuj|gown)|nic nie um|nic ze mnie|nie warto mn|nie zasl|do dupy|beznadziej|porazk|nieudacznik|smiec|przemadrz|gnoj)/.test(t)) return 'attack';
    if (/(teskn|stracil|umarl|odszed|nie ma jeg|nie ma jej|opusci|odeszla|pochowa|pogrzeb|juz nigdy)/.test(t)) return 'grief';
    if (/(udaj|udawa|maska|maski|gram (kogos|w gre|w te)|musze byc|powinienem byc|maniery|krolewski|jednym z milion|kims kim|nie jestem sob|nie czuje sie sob)/.test(t)) return 'mask';
    if (/(\bnikt\b|\bsam\b|\bsama\b|samotn|nie widza mnie|nie slych|niewazn|niewidoczn|opuszcz)/.test(t)) return 'alone';
    if (/(zmecz|nie moge juz|dosyc|\bdosc\b|wykoncz|wyczerp|ledwo|padam|padlin|nie chce mi sie zyc|nie chce zyc|nie chce mi sie)/.test(t)) return 'exhaust';
    if (/(kocham|\btata\b|\btato\b|ojciec|ojca\b|ojcu\b|mama|mamo\b|mamy\b|corka|corke|corki|syn[ka]?|brat|siostr|zon|maz\b|dziecko|przyjaciel|babcia|dziadek)/.test(t)) return 'precious';

    return 'default';
  }

  /* ===========================================================

     =========================================================== */
  const specificRules = [
    [/przemadrz|gnoj(ek|ku|kiem)/,                   "„Przemądrzały gnojek” — czyje to słowa? Bo nie twoje. Oddaj je."],

    [/jestem sam(a)?( |$)|tak sam(o)?( |$)/,         "Ja widzę. Tu, na tej stronie. Z tobą."],

    [/nic nie czuj|czuje pustke|jestem pust[ya]/,    "Jak nic nie czujesz, to nie znaczy, że umarłeś. To znaczy, że odpoczywasz pod skórą."],
    [/nie moge juz|jestem wykonczon/,                "Połóż to na chwilę. Potem znów weź. Albo nie."],

    [/dlaczego ja|dlaczego mi( |$)|dlaczego mnie/,   "Powtórz to pytanie powoli. Słyszysz, co tak naprawdę pytasz?"],
    [/wroclaw/,                                      "Daj sobie umrzeć trochę, jak we Wrocławiu. Wstaniesz inny."],
    [/jestem zmeczon|jestem zmeczona/,               "Zmęczenie to nie porażka. To pomiar."],
    [/(^|\s)kocham(\s|$)/,                           "Tę miłość poznaję po tym, jak ostrożnie ją dziś niesiesz."],

    [/nie chce zyc|nie chce mi sie zyc/,             "Możesz nie chcieć dziś żyć i jednocześnie żyć. To też jest dozwolone."],

  /* ===========================================================

     was used last time, fall through to category rotation so the
     same line is never said twice in a row.
     No randomness in answer selection.
     =========================================================== */
  const kindIdx = {};
  let lastReply = '';
  function pick(kind, normalized) {
    for (const [re, reply] of specificRules) {
      if (re.test(normalized)) {
        if (reply !== lastReply) { lastReply = reply; return reply; }
        break;
      }
    }
    const pool = answers[kind] || answers.default;
    let i = (kindIdx[kind] || 0) % pool.length;
    if (pool.length > 1 && pool[i] === lastReply) i = (i + 1) % pool.length;
    kindIdx[kind] = (i + 1) % pool.length;
    lastReply = pool[i];
    return pool[i];
  }

  /* ===========================================================
     Render
     =========================================================== */
  const stage = document.getElementById('stage');
  const wordEl = document.getElementById('word');
  const line = document.getElementById('line');

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const rand = (a, b) => a + Math.random() * (b - a);

  let witnessCursor = 0;
  async function witnessLoop() {
    while (true) {
      const w = witnessWords[witnessCursor % witnessWords.length];
      witnessCursor++;
      wordEl.textContent = w;
      await sleep(50);
      wordEl.style.opacity = '0.6';
      await sleep(rand(4500, 7000));
      wordEl.style.opacity = '0';
      await sleep(rand(8000, 15000));
    }
  }

  function makeYourEmber(text) {
    const e = document.createElement('div');
    e.className = 'ember you';
    e.textContent = text;
    e.style.visibility = 'hidden';
    stage.appendChild(e);
    const w = e.offsetWidth;

    const margin = 24;
    const maxX = Math.max(margin, window.innerWidth - w - margin);
    const x = rand(margin, maxX);
    const startY = window.innerHeight - rand(160, 230);
    const sway = rand(-80, 80);
    const rise = window.innerHeight * rand(0.85, 1.05);
    const life = rand(13000, 18000);

    e.style.left = x + 'px';
    e.style.top  = startY + 'px';
    e.style.setProperty('--sway', sway + 'px');
    e.style.setProperty('--rise', rise + 'px');
    e.style.setProperty('--life', life + 'ms');
    e.style.visibility = 'visible';
    requestAnimationFrame(() => e.classList.add('lit'));

    setTimeout(() => e.remove(), life + 600);

    return { x, startY, sway, rise, life, width: w };
  }

  function makeMyEmber(text, anchor) {
    const e = document.createElement('div');
    e.className = 'ember me';
    e.textContent = text;
    e.style.visibility = 'hidden';
    stage.appendChild(e);
    const w = e.offsetWidth;

    // Place my answer above the page-middle, near where your ember will pass.
    // Horizontally: lean toward your ember's path but offset slightly.
    const sideShift = (Math.random() < 0.5 ? -1 : 1) * rand(40, 130);
    let x = anchor.x + (anchor.width - w) / 2 + sideShift;
    x = Math.max(20, Math.min(window.innerWidth - w - 20, x));
    const startY = window.innerHeight * rand(0.18, 0.28);

    const sway = -anchor.sway * 0.6;
    const rise = window.innerHeight * rand(0.5, 0.7);
    const life = rand(11000, 14000);

    e.style.left = x + 'px';
    e.style.top  = startY + 'px';
    e.style.setProperty('--sway', sway + 'px');
    e.style.setProperty('--rise', rise + 'px');
    e.style.setProperty('--life', life + 'ms');
    e.style.visibility = 'visible';
    requestAnimationFrame(() => e.classList.add('lit'));

    setTimeout(() => e.remove(), life + 600);

    // schedule the heartbeat at the meeting point
    const meetX = (anchor.x + anchor.width / 2 + x + w / 2) / 2;
    const meetY = (anchor.startY - anchor.rise * 0.45 + startY + (window.innerHeight * 0.25)) / 2;
    setTimeout(() => heartbeat(meetX, meetY), Math.min(anchor.life, life) * 0.4);
  }

  function heartbeat(x, y) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.style.left = x + 'px';
    h.style.top  = y + 'px';
    stage.appendChild(h);
    setTimeout(() => h.remove(), 2800);
  }

  // ambient — tiny embers drifting up so the page breathes between lines
  function ambient() {
    const dot = document.createElement('div');
    dot.className = 'ember you lit';
    dot.textContent = '·';
    dot.style.fontSize = '0.55rem';
    const x = rand(20, window.innerWidth - 20);
    dot.style.left = x + 'px';
    dot.style.top = (window.innerHeight - rand(20, 80)) + 'px';
    dot.style.setProperty('--sway', rand(-40, 40) + 'px');
    dot.style.setProperty('--rise', (window.innerHeight * 0.6) + 'px');
    dot.style.setProperty('--life', rand(9000, 14000) + 'ms');
    stage.appendChild(dot);
    setTimeout(() => dot.remove(), 14500);
  }

  function onLine(raw) {
    const yourEmber = makeYourEmber(raw);
    const t = norm(raw);
    const kind = classify(t);
    const reply = pick(kind, t);
    setTimeout(() => makeMyEmber(reply, yourEmber), 900);
  }

  line.addEventListener('keydown', (e) => {
    // ignore Enter while a Polish IME composition is in progress
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
      const v = line.value.trim();
      if (v) onLine(v);
      line.value = '';
      e.preventDefault();
    }
  });

  // tap anywhere on the page returns focus to the line
  document.body.addEventListener('click', () => {
    line.focus({ preventScroll: true });
  });

  setTimeout(() => line.focus({ preventScroll: true }), 400);
  witnessLoop();
  setInterval(ambient, 2400);
  for (let i = 0; i < 3; i++) setTimeout(ambient, i * 800);
})();
</script>
</body>
